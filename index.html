<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM AUTO AND SERVICES | QUANTUM OS v500</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --orange:#FF5A00; --green:#00D26A; --cyan:#00D4FF; --red:#FF0040; }

html, body { background: #000!important; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; margin: 0; }
.quantum-bg { background: radial-gradient(circle at 30% 20%, rgba(0,212,255,0.15) 0%, #000 70%)!important; }
.q-card { background: rgba(10,20,40,0.85); border: 1px solid rgba(0,212,255,0.3); border-radius: 20px; }
.quantum-text { text-shadow: 0 0 8px var(--cyan); font-family: 'Orbitron', sans-serif; font-weight: 900; }
.btn-primary{background:linear-gradient(90deg,var(--orange),var(--green));color:#000;padding:14px 20px;border-radius:12px;font-weight:700;cursor:pointer;border:none;width:100%}
.btn-role{padding:20px;border-radius:16px;border:2px solid var(--cyan);cursor:pointer;transition:0.3s;text-align:center}
.btn-role:hover{background:rgba(0,212,255,0.1);transform:scale(1.05)}
.hidden{display:none}
.role-ceo{border-color:var(--orange)}
.role-manager{border-color:var(--green)}
.role-reception{border-color:var(--cyan)}

@media (max-width: 768px){.grid-cols-3{grid-template-columns: repeat(1, minmax(0, 1fr))!important} canvas{display:none} }
</style>
</head>
<body class="text-white quantum-bg">

<!-- LOGIN SCREEN - SHOWS FIRST -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="q-card p-8 max-w-2xl w-full">
    <div class="text-center mb-6">
      <img src="https://files.catbox.moe/lsd025.jpg" class="h-16 mx-auto mb-3">
      <h1 class="text-4xl font-black quantum-text">PSM OS // QUANTUM</h1>
      <p class="text-cyan-400">Select Your Role To Continue</p>
    </div>

    <div class="grid grid-cols-3 gap-4 mb-6">
      <div onclick="selectRole('CEO')" class="btn-role role-ceo">
        <p class="text-2xl">👑</p>
        <p class="font-black text-lg">CEO</p>
        <p class="text-xs">Full Access</p>
      </div>
      <div onclick="selectRole('Manager')" class="btn-role role-manager">
        <p class="text-2xl">📊</p>
        <p class="font-black text-lg">MANAGER</p>
        <p class="text-xs">Ops + Jobs</p>
      </div>
      <div onclick="selectRole('Reception')" class="btn-role role-reception">
        <p class="text-2xl">📞</p>
        <p class="font-black text-lg">RECEPTION</p>
        <p class="text-xs">Create Jobs</p>
      </div>
    </div>

    <div id="passBox" class="hidden">
      <input id="password" type="password" placeholder="Enter Password" class="w-full bg-gray-800 p-3 rounded-lg mb-3">
      <button onclick="login()" class="btn-primary">LOGIN</button>
      <p id="loginError" class="text-red-400 text-center mt-2 text-sm"></p>
    </div>
  </div>
</div>

<!-- MAIN APP - HIDDEN UNTIL LOGIN -->
<div id="app" class="hidden">
  <div class="fixed top-4 right-4 q-card p-2 text-xs z-50">
    <p>Role: <span id="currentRole" class="font-black"></span></p>
    <button onclick="logout()" class="text-red-400">LOGOUT</button>
  </div>

  <!-- NAV -->
  <nav class="fixed top-0 w-full z-30 flex justify-between items-center p-4 bg-black/70">
    <img src="https://files.catbox.moe/lsd025.jpg" class="h-10">
    <div id="navLinks" class="flex gap-4 text-sm font-bold"></div>
  </nav>

  <!-- DASHBOARD -->
  <section id="os" class="min-h-screen pt-24 p-4">
    <h1 class="text-4xl font-black quantum-text mb-6">PSM OS // QUANTUM</h1>
    <div class="grid grid-cols-3 gap-4">

      <!-- FINANCE - CEO ONLY -->
      <div id="financeCard" class="q-card p-6 col-span-3 md:col-span-2">
        <h3 class="text-lg font-black quantum-text">QUANTUM FINANCE</h3>
        <p class="text-4xl font-black quantum-text mt-2" id="revenue">R8,400,000</p>
      </div>

      <!-- JOBS -->
      <div class="q-card p-6 col-span-3">
        <h3 class="text-lg font-black quantum-text">JOBS</h3>
        <div id="jobList" class="mt-3 space-y-2"></div>
      </div>

      <!-- CREATE JOB - RECEPTION + -->
      <div id="createJobCard" class="q-card p-6 col-span-3">
        <h3 class="text-lg font-black quantum-text">CREATE NEW JOB</h3>
        <div class="grid grid-cols-2 gap-3 mt-3">
          <input id="clientName" placeholder="Client Name">
          <input id="clientPhone" placeholder="WhatsApp 27...">
          <input id="reg" placeholder="Reg/Machine">
          <select id="status"><option>QUOTED</option><option>IN PROGRESS</option><option>QC</option><option>INVOICED</option></select>
          <input id="amount" type="number" placeholder="Amount R" class="col-span-2">
        </div>
        <button onclick="saveJob()" class="btn-primary mt-3">💾 SAVE JOB</button>
      </div>

      <!-- ADMIN TOOLS - CEO ONLY -->
      <div id="adminTools" class="q-card p-6 col-span-3">
        <h3 class="text-lg font-black red-text">CEO ADMIN TOOLS</h3>
        <button onclick="exportData()" class="btn-primary mt-2">📊 EXPORT ALL DATA</button>
        <button onclick="clearData()" class="btn-primary mt-2 bg-red-600">🗑️ CLEAR ALL DATA</button>
      </div>

    </div>
  </section>

  <!-- SERVICES - PUBLIC -->
  <section id="services" class="py-16 px-4">
    <h2 class="text-4xl text-center font-black quantum-text">OUR SERVICES</h2>
    <div class="grid grid-cols-3 gap-6 mt-10 max-w-7xl mx-auto">
      <div class="q-card p-5"><h3 class="text-xl font-black text-orange-500">AUTOMOTIVE REPAIRS</h3></div>
      <div class="q-card p-5"><h3 class="text-xl font-black text-orange-500">MINE TRUCKS</h3></div>
      <div class="q-card p-5"><h3 class="text-xl font-black text-orange-500">EXCAVATORS</h3></div>
    </div>
  </section>
</div>

<script>
const { jsPDF } = window.jspdf;
let currentRole = '';
let jobs = JSON.parse(localStorage.getItem('psm_jobs')) || [];

// ROLE PASSWORDS - CHANGE THESE
const passwords = {
  CEO: "ceo2026",
  Manager: "mgr2026",
  Reception: "rec2026"
}

function selectRole(role){
  currentRole = role;
  document.getElementById('passBox').classList.remove('hidden');
  document.getElementById('password').placeholder = `Enter ${role} Password`;
}

function login(){
  const pass = document.getElementById('password').value;
  if(pass === passwords[currentRole]){
    localStorage.setItem('psm_role', currentRole);
    showApp();
  } else {
    document.getElementById('loginError').innerText = "Wrong Password";
  }
}

function showApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('currentRole').innerText = currentRole;
  applyRolePermissions();
  loadJobs();
}

function logout(){
  localStorage.removeItem('psm_role');
  location.reload();
}

function applyRolePermissions(){
  const nav = document.getElementById('navLinks');

  if(currentRole === "CEO"){
    nav.innerHTML = `<a href="#os">DASHBOARD</a><a href="#services">SERVICES</a>`;
    document.getElementById('financeCard').classList.remove('hidden');
    document.getElementById('adminTools').classList.remove('hidden');
    document.getElementById('createJobCard').classList.remove('hidden');
  }

  if(currentRole === "Manager"){
    nav.innerHTML = `<a href="#os">DASHBOARD</a><a href="#services">SERVICES</a>`;
    document.getElementById('financeCard').classList.add('hidden'); // No finance
    document.getElementById('adminTools').classList.add('hidden'); // No delete
    document.getElementById('createJobCard').classList.remove('hidden');
  }

  if(currentRole === "Reception"){
    nav.innerHTML = `<a href="#os">JOBS</a><a href="#services">SERVICES</a>`;
    document.getElementById('financeCard').classList.add('hidden');
    document.getElementById('adminTools').classList.add('hidden');
    document.getElementById('createJobCard').classList.remove('hidden');
    // Disable status change for reception
    document.getElementById('status').disabled = true;
  }
}

function saveJob(){
  const job = {
    id: Date.now(),
    client: clientName.value,
    phone: clientPhone.value,
    reg: reg.value,
    total: parseFloat(amount.value) || 0,
    status: status.value,
    createdBy: currentRole
  };
  jobs.push(job);
  localStorage.setItem('psm_jobs', JSON.stringify(jobs));
  loadJobs();
  alert("Job Saved");
}

function loadJobs(){
  jobList.innerHTML = '';
  jobs.slice(-10).forEach(j=>{
    let deleteBtn = currentRole === "CEO"? `<button onclick="deleteJob(${j.id})" class="text-red-400 text-xs">DELETE</button>` : '';
    jobList.innerHTML += `
    <div class="q-card p-3 flex justify-between">
      <div>
        <p class="font-black">${j.reg} - ${j.client}</p>
        <p class="text-sm">R${j.total.toLocaleString()} | ${j.status} | By: ${j.createdBy}</p>
      </div>
      ${deleteBtn}
    </div>`;
  });
}

function deleteJob(id){
  if(currentRole!== "CEO") return;
  jobs = jobs.filter(j => j.id!== id);
  localStorage.setItem('psm_jobs', JSON.stringify(jobs));
  loadJobs();
}

function exportData(){
  if(currentRole!== "CEO") return;
  let csv = "ID,Reg,Client,Amount,Status,CreatedBy\n";
  jobs.forEach(j=>{ csv += `${j.id},${j.reg},${j.client},${j.total},${j.status},${j.createdBy}\n` });
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'PSM_Jobs.csv'; a.click();
}

function clearData(){
  if(currentRole!== "CEO") return;
  if(confirm("Delete ALL jobs?")){ localStorage.clear(); location.reload(); }
}

// AUTO LOGIN IF ALREADY LOGGED IN
window.onload = () => {
  const savedRole = localStorage.getItem('psm_role');
  if(savedRole){ currentRole = savedRole; showApp(); }
}
</script>
</body>
</html>
