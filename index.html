<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SHANA PRINCESS - GOD TIER 2026</title>
<style>
  :root{
    --bg1:#1a0033;--bg2:#4a0080;--bg3:#ff00ff;
    --gold:#ffd700;--pink:#ff69b4;--cyan:#00ffff;
    --glass:rgba(255,255,255,0.12);--blur:30px;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;user-select:none}
  body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    color:#fff;overflow:hidden;height:100vh;
  }
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 15px var(--pink))}50%{filter:drop-shadow(0 0 30px var(--cyan))}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

  #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:999}
  .title{font-size:clamp(30px,8vw,80px);font-weight:900;background:linear-gradient(90deg,#ffd700,#ff69b4,#00ffff,#ffd700);background-size:300%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 2s infinite, float 3s infinite}

  #menu{display:none;text-align:center;padding:20px}
  .btn{
    background:linear-gradient(90deg,var(--gold),var(--pink));color:#000;border:none;
    padding:15px 30px;margin:10px;border-radius:20px;font-weight:900;font-size:16px;cursor:pointer;
    box-shadow:0 0 20px rgba(255,105,180,.5);transition:.3s
  }
  .btn:hover{transform:scale(1.1) rotate(-2deg);box-shadow:0 0 40px var(--cyan)}

  #game{display:none;width:100%;height:100%;position:relative}
  #topbar{display:flex;justify-content:space-between;padding:10px;background:var(--glass);backdrop-filter:blur(var(--blur))}
  .stat{background:var(--glass);padding:8px 15px;border-radius:15px;border:2px solid var(--gold)}

  #mainCanvas{width:100%;height:calc(100% - 60px)}
  #ui{position:absolute;bottom:0;left:0;width:100%;display:flex;gap:10px;padding:10px;justify-content:center;flex-wrap:wrap}

  .wardrobe{position:absolute;right:0;top:60px;width:320px;height:calc(100% - 120px);background:var(--glass);backdrop-filter:blur(var(--blur));overflow-y:auto;padding:10px;border-left:3px solid var(--pink)}
  .item{width:90px;height:90px;background:rgba(255,255,255,.2);margin:5px;display:inline-block;border-radius:10px;cursor:pointer;border:2px solid transparent;text-align:center;font-size:10px;padding-top:5px;transition:.2s}
  .item:hover{border-color:var(--gold);transform:scale(1.1)}
  .item.active{border:3px solid var(--cyan);box-shadow:0 0 15px var(--cyan)}

  #dragon{position:absolute;left:20px;bottom:100px;font-size:80px;animation:float 2s infinite;cursor:grab;filter:drop-shadow(0 0 20px pink)}
  #questLog{position:absolute;left:10px;top:70px;width:250px;background:var(--glass);padding:10px;border-radius:15px;font-size:12px;max-height:200px;overflow-y:auto}
</style>
</head>
<body>

<div id="loading"><div class="title">SHANA PRINCESS<br><span style="font-size:20px">GOD TIER 2026</span></div></div>

<div id="menu">
  <h1 class="title">SHANA PRINCESS</h1>
  <p style="margin:20px">Fashion + Magic + Dragons + Rhythm</p>
  <button class="btn" onclick="startGame('adventure')">ADVENTURE MODE</button>
  <button class="btn" onclick="startGame('academy')">COVEN ACADEMY</button>
  <button class="btn" onclick="startGame('battle')">DRAGON ARENA</button>
  <button class="btn" onclick="loadGame()">LOAD GAME</button>
</div>

<div id="game">
  <div id="topbar">
    <div class="stat">💎 Gems: <span id="gems">1000</span></div>
    <div class="stat">👑 Level: <span id="level">1</span></div>
    <div class="stat">❤️ Energy: <span id="energy">100</span></div>
    <div class="stat">🐉 Dragon: <span id="dragonLevel">1</span></div>
  </div>
  
  <canvas id="mainCanvas"></canvas>
  
  <div id="questLog"><b>QUESTS:</b><br>1. Collect 3 Crystal Outfits<br>2. Win Dragon Battle<br>3. Attend Royal Ball</div>
  
  <div id="dragon" onclick="feedDragon()">🐉</div>
  
  <div class="wardrobe" id="wardrobe">
    <h3>DRESS UP</h3>
    <div class="item active" onclick="equip(0)" style="background:linear-gradient(red,orange)">🔥<br>Fire Dress</div>
    <div class="item" onclick="equip(1)" style="background:linear-gradient(cyan,blue)">❄️<br>Ice Gown</div>
    <div class="item" onclick="equip(2)" style="background:linear-gradient(pink,purple)">✨<br>Royal Robe</div>
    <div class="item" onclick="equip(3)" style="background:linear-gradient(green,lime)">🌿<br>Nature Set</div>
    <div class="item" onclick="equip(4)" style="background:linear-gradient(gold,#007A4D)">👑<br>SA Queen</div>
    <div class="item" onclick="gacha()">🎁<br>GACHA R50</div>
  </div>

  <div id="ui">
    <button class="btn" onclick="battle()">⚔️ BATTLE</button>
    <button class="btn" onclick="rhythm()">🎵 RHYTHM</button>
    <button class="btn" onclick="school()">🏫 SCHOOL</button>
    <button class="btn" onclick="saveGame()">💾 SAVE</button>
  </div>
</div>

<script>
// GOD TIER ENGINE v3 - CINEMATIC
let gameState = {
  gems:1000, level:1, energy:100, dragonLevel:1,
  outfit:0, dragonHunger:100, quests:[0,1,2],
  inventory:['Fire Dress','Starter Wand'],
  mode:'adventure'
};

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 120;

let animationFrame = 0;
let particles = [];

// OUTSOURCED ANIME SPRITE SYSTEM
const OUTFITS = [
  {name:"Fire Dress", c1:"#ff3300", c2:"#ff9900", effect:"fire", glow:"#ff6600"},
  {name:"Ice Gown", c1:"#00ccff", c2:"#0066ff", effect:"ice", glow:"#00ffff"},
  {name:"Royal Robe", c1:"#ff66cc", c2:"#9900ff", effect:"sparkle", glow:"#ff00ff"},
  {name:"Nature Set", c1:"#33cc33", c2:"#99ff00", effect:"leaves", glow:"#00ff00"},
  {name:"SA Queen", c1:"#ffd700", c2:"#007A4D", effect:"crown", glow:"#ffd700"}
];

class Particle{
  constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;this.life=100;this.color=color}
  update(){this.x+=this.vx;this.y+=this.vy;this.life--}
  draw(){ctx.fillStyle=this.color;ctx.globalAlpha=this.life/100;ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++) particles.push(new Particle(x,y,color));
}

function drawBackground(){
  // ANIMATED GRADIENT
  const gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  gradient.addColorStop(0, `hsl(${(animationFrame*0.1)%360},70%,20%)`);
  gradient.addColorStop(1, `hsl(${(animationFrame*0.1+180)%360},70%,10%)`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // Bokeh lights
  for(let i=0;i<30;i++){
    ctx.fillStyle = `rgba(255,255,255,${Math.sin(animationFrame*0.02+i)*0.2})`;
    ctx.beginPath();
    ctx.arc(canvas.width/2 + Math.sin(animationFrame*0.005+i)*300, canvas.height/2 + Math.cos(animationFrame*0.005+i)*300, 50, 0, Math.PI*2);
    ctx.fill();
  }
}

// GOD TIER CHARACTER - SMOOTH ANIME STYLE
function drawPlayer(){
  const x = canvas.width/2;
  const y = canvas.height/2 + Math.sin(animationFrame*0.05)*10;
  const outfit = OUTFITS[gameState.outfit];
  
  ctx.save();
  ctx.translate(x,y);
  
  // GLOW
  ctx.shadowBlur = 30;
  ctx.shadowColor = outfit.glow;
  
  // SHADOW
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.ellipse(0, 80, 50, 15, 0, 0, Math.PI*2);
  ctx.fill();
  
  // DRESS WITH GRADIENT + SHINE
  const dressGradient = ctx.createLinearGradient(-50,-40,50,70);
  dressGradient.addColorStop(0, outfit.c1);
  dressGradient.addColorStop(0.5, outfit.c2);
  dressGradient.addColorStop(1, outfit.c1);
  ctx.fillStyle = dressGradient;
  ctx.beginPath();
  ctx.moveTo(-45, 0);
  ctx.bezierCurveTo(-20, 50, 20, 50, 45, 0);
  ctx.lineTo(35, 70);
  ctx.lineTo(-35, 70);
  ctx.closePath();
  ctx.fill();
  
  // DRESS SHINE
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(-20,5);ctx.lineTo(-10,40);ctx.lineTo(-5,40);ctx.closePath();ctx.fill();
  
  // TOP
  ctx.fillStyle = outfit.c1;
  ctx.beginPath();
  ctx.roundRect(-22, -40, 44, 45, 15);
  ctx.fill();
  
  // ARMS WITH BEND
  ctx.fillStyle = '#ffdbac';
  ctx.beginPath();
  ctx.arc(-28, -15 + Math.sin(animationFrame*0.1)*2, 10, 0, Math.PI*2);
  ctx.arc(28, -15 + Math.sin(animationFrame*0.1+Math.PI)*2, 10, 0, Math.PI*2);
  ctx.fill();
  
  // HEAD
  ctx.fillStyle = '#ffdbac';
  ctx.beginPath();
  ctx.arc(0, -55, 20, 0, Math.PI*2);
  ctx.fill();
  
  // HAIR WITH HIGHLIGHT
  ctx.fillStyle = '#3d2817';
  ctx.beginPath();
  ctx.arc(0, -60, 23, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(-8,-65,5,0,Math.PI*2);ctx.fill(); // hair shine
  
  // EYES - ANIME STYLE
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(-7, -57, 4, 5, 0, 0, Math.PI*2);
  ctx.ellipse(7, -57, 4, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff'; // eye shine
  ctx.beginPath();ctx.arc(-6,-58,1.5,0,Math.PI*2);ctx.arc(8,-58,1.5,0,Math.PI*2);ctx.fill();
  
  // CROWN
  if(gameState.outfit==4){
    ctx.fillStyle = '#ffd700';
    ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700';
    ctx.beginPath();
    for(let i=0;i<7;i++){
      let ang = (i/7)*Math.PI - Math.PI/2;
      ctx.lineTo(Math.cos(ang)*15, Math.sin(ang)*15 - 65);
    }
    ctx.fill(); ctx.shadowBlur = 0;
  }
  
  // EFFECTS
  if(outfit.effect=="fire" && animationFrame%5==0) spawnParticles((Math.random()-0.5)*80, (Math.random()-0.5)*60, '#ff6600', 1);
  if(outfit.effect=="ice" && animationFrame%8==0) spawnParticles((Math.random()-0.5)*80, (Math.random()-0.5)*60, '#00ffff', 1);
  if(outfit.effect=="sparkle" && animationFrame%10==0) spawnParticles((Math.random()-0.5)*80, (Math.random()-0.5)*60, '#fff', 1);
  
  ctx.restore();
}

function updateParticles(){
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw()});
}

// GAME LOOP
function startGame(mode){
  gameState.mode = mode;
  document.getElementById('loading').style.display='none';
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  gameLoop();
}

function gameLoop(){
  animationFrame++;
  drawBackground();
  drawPlayer();
  updateParticles();
  updateUI();
  requestAnimationFrame(gameLoop);
}

function updateUI(){
  document.getElementById('gems').innerText = gameState.gems;
  document.getElementById('level').innerText = gameState.level;
  document.getElementById('energy').innerText = gameState.energy;
  document.getElementById('dragonLevel').innerText = gameState.dragonLevel;
}

function equip(id){
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.item')[id].classList.add('active');
  gameState.outfit = id;
  gameState.energy -= 5;
  spawnParticles(canvas.width/2, canvas.height/2, '#fff', 20);
}

function feedDragon(){
  if(gameState.gems>=10){
    gameState.gems-=10;gameState.dragonLevel++;
    spawnParticles(100, canvas.height-150, 'pink', 15);
  }
}

function rhythm(){
  let score=0;
  for(let i=0;i<4;i++){if(confirm(`Hit: ${['↑','↓','←','→'][Math.floor(Math.random()*4)]}`))score+=25}
  gameState.gems += score;
}

function battle(){
  if(gameState.energy<20) return alert("No energy!");
  gameState.energy-=20;
  const win = Math.random() < (0.3 + gameState.outfit*0.1);
  if(win){gameState.gems+=100;gameState.level++;spawnParticles(canvas.width/2,canvas.height/2,'gold',30)}
  else alert("Try a stronger outfit!");
}

function school(){
  const c = prompt(`1.Potion 2.Spell 3.Dragon`);
  if(c>0&&c<4){gameState.gems+=50;gameState.energy-=10}
}

function gacha(){
  if(gameState.gems<50) return alert("No gems!");
  gameState.gems-=50;
  const won = ['Legendary Gown','Dragon Egg','Magic Tiara','Crystal Wings','SA Crown'][Math.floor(Math.random()*5)];
  gameState.inventory.push(won);
  spawnParticles(canvas.width/2,canvas.height/2,'gold',40);
  alert(`YOU GOT: ${won}!`);
}

function saveGame(){localStorage.setItem('shanaPrincess',JSON.stringify(gameState))}
function loadGame(){const d=localStorage.getItem('shanaPrincess');if(d){gameState=JSON.parse(d);startGame('adventure')}else alert("No save")}

setTimeout(()=>{document.getElementById('loading').style.display='none';document.getElementById('menu').style.display='block'},2000);
window.addEventListener('resize', ()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight-120});
</script>
</body>
</html>
