<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PSM OS v500 PRO UI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #040A18; --card: #0B1224; --accent: #00D4FF; --green: #00FF88; }
body { background: radial-gradient(1200px 800px at 50% -20%, rgba(0,212,255,0.1), transparent), var(--bg); font-family: 'Manrope', sans-serif; }
.card { background: linear-gradient(180deg, rgba(11,18,36,0.9) 0%, rgba(4,10,24,0.9) 100%); border: 1px solid rgba(0,212,255,0.15); border-radius: 24px; backdrop-filter: blur(20px); }
.btn { background: linear-gradient(90deg, var(--accent), var(--green)); color: #000; font-weight: 800; border-radius: 16px; transition: all 0.2s; }
.btn:active { transform: scale(0.97); }
.job-card { background: var(--card); border-radius: 20px; padding: 16px; border-left: 4px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.status-pill { font-size: 10px; padding: 4px 8px; border-radius: 20px; font-weight: 700; }
.bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(11,18,36,0.8); backdrop-filter: blur(30px); border: 1px solid rgba(0,212,255,0.2); border-radius: 30px; padding: 8px; }
.shimmer { background: linear-gradient(90deg, #0B1224 25%, #121A2F 50%, #0B1224 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body class="text-white pb-24">

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-[#040A18]/80 backdrop-blur-2xl border-b border-[rgba(0,212,255,0.1)]">
  <div class="max-w-[1600px] mx-auto p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-green-400 rounded-2xl flex items-center justify-center font-black text-black text-xl">P</div>
      <div>
        <h1 class="text-xl font-black">PSM OS</h1>
        <p class="text-xs text-green-400">● 500 Pillars Online</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <p id="liveClock" class="text-sm font-semibold"></p>
        <p class="text-xs text-gray-400">Pretoria</p>
      </div>
      <img src="https://ui-avatars.com/api/?name=PSM&background=00D4FF&color=000" class="w-10 h-10 rounded-full">
    </div>
  </div>
</header>

<!-- KPI GRID -->
<div class="max-w-[1600px] mx-auto p-6">
  <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
    <div class="card p-5">
      <p class="text-gray-400 text-sm">Revenue MTD</p>
      <p id="kpiRev" class="text-3xl font-black mt-1">R0</p>
      <p class="text-green-400 text-xs mt-1">↑ 24.5%</p>
    </div>
    <div class="card p-5">
      <p class="text-gray-400 text-sm">Gross Profit</p>
      <p id="kpiGP" class="text-3xl font-black mt-1 text-green-400">0%</p>
    </div>
    <div class="card p-5">
      <p class="text-gray-400 text-sm">Valuation</p>
      <p id="kpiVal" class="text-3xl font-black mt-1 text-cyan-400">R0</p>
    </div>
    <div class="card p-5">
      <p class="text-gray-400 text-sm">Active Jobs</p>
      <p class="text-3xl font-black mt-1">12</p>
    </div>
    <div class="card p-5">
      <p class="text-gray-400 text-sm">AI Accuracy</p>
      <p class="text-3xl font-black mt-1">96.1%</p>
    </div>
  </div>

  <!-- JOB BOARD -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Job Board</h2>
    <button onclick="newJobModal()" class="btn px-6 py-3">+ New Job</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
    <div>
      <h3 class="font-semibold mb-3">Quoted <span class="status-pill bg-yellow-500/20 text-yellow-400">3</span></h3>
      <div id="col-quote" class="space-y-3 min-h-"></div>
    </div>
    <div>
      <h3 class="font-semibold mb-3">Approved <span class="status-pill bg-blue-500/20 text-blue-400">2</span></h3>
      <div id="col-approved" class="space-y-3 min-h-"></div>
    </div>
    <div>
      <h3 class="font-semibold mb-3">In Progress <span class="status-pill bg-cyan-500/20 text-cyan-400">4</span></h3>
      <div id="col-progress" class="space-y-3 min-h-"></div>
    </div>
    <div>
      <h3 class="font-semibold mb-3">QC <span class="status-pill bg-purple-500/20 text-purple-400">1</span></h3>
      <div id="col-qc" class="space-y-3 min-h-"></div>
    </div>
    <div>
      <h3 class="font-semibold mb-3">Invoiced <span class="status-pill bg-green-500/20 text-green-400">8</span></h3>
      <div id="col-invoiced" class="space-y-3 min-h-"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV - MOBILE APP -->
<nav class="bottom-nav flex gap-6 px-6 py-3">
  <button class="flex flex-col items-center text-cyan-400"><svg class="w-6 h-6" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="text-xs">Jobs</span></button>
  <button class="flex flex-col items-center text-gray-400"><svg class="w-6 h-6" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg><span class="text-xs">Finance</span></button>
  <button class="flex flex-col items-center text-gray-400"><svg class="w-6 h-6" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.19 0 2.34-.21 3.41-.6L4.1 5.59C3.7 7.27 3.5 9.1 3.5 11c0 4.97 4.03 9 9 9s9-4.03 9-9-4.03-9-9-9z"/></svg><span class="text-xs">AI</span></button>
</nav>

<!-- JOB MODAL -->
<div id="jobModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="card w-full max-w-[900px] p-8">
    <h2 class="text-2xl font-bold mb-6">Create Job Card</h2>
    <div class="grid grid-cols-2 gap-4">
      <input id="jcReg" placeholder="Registration / VIN" class="bg-[#0F1529] p-4 rounded-2xl border-[rgba(0,212,255,0.2)]">
      <input id="jcClient" placeholder="Client Name" class="bg-[#0F1529] p-4 rounded-2xl border border-[rgba(0,212,255,0.2)]">
    </div>
    <textarea id="jcConcern" onkeyup="runAI(this.value)" placeholder="Describe the issue... AI will suggest parts" class="w-full bg-[#0F1529] p-4 rounded-2xl border border-[rgba(0,212,255,0.2)] mt-4 h-32"></textarea>
    <div id="aiSuggest" class="text-cyan-400 mt-3 text-sm"></div>
    <button onclick="saveJob()" class="btn w-full py-4 mt-6">Save & Send Quote</button>
  </div>
</div>

<script>
let jobs = [
  {id:'JC001',reg:'CAT-773',client:'Anglo Platinum',total:84000,cost:48000,status:'progress',phone:'2782'}
];

setInterval(()=>liveClock.innerText=new Date().toLocaleTimeString('en-ZA'),1000);

function loadKanban(){
  ['quote','approved','progress','qc','invoiced'].forEach(c=>document.getElementById('col-'+c).innerHTML='');
  jobs.forEach(j=>{
    let gp = ((j.total-j.cost)/j.total*100).toFixed(1);
    document.getElementById('col-'+j.status).innerHTML += `
    <div class="job-card" data-id="${j.id}">
      <div class="flex justify-between">
        <p class="font-bold">${j.reg}</p>
        <p class="text-green-400 font-bold">R${j.total.toLocaleString()}</p>
      </div>
      <p class="text-sm text-gray-400">${j.client}</p>
      <div class="flex justify-between items-center mt-3">
        <span class="status-pill bg-green-500/20 text-green-400">GP: ${gp}%</span>
        <button onclick="whatsapp('${j.phone}')" class="text-xs text-cyan-400">WhatsApp</button>
      </div>
    </div>`;
  });
  ['quote','approved','progress','qc','invoiced'].forEach(s=>{
    new Sortable(document.getElementById('col-'+s),{group:'jobs',animation:200});
  });
}

function runAI(txt){
  if(txt.length > 5) aiSuggest.innerHTML = "🤖 AI: Detected 'brake'. Suggest: Pads R1200, Skim R800. Total R2000. Confidence 94%";
}

function whatsapp(n){window.open(`https://wa.me/${n}`)}
function saveJob(){jobs.push({id:'JC'+Date.now(),reg:jcReg.value,client:jcClient.value,total:5000,cost:3000,status:'quote'}); jobModal.classList.add('hidden'); loadKanban();}
function newJobModal(){jobModal.classList.remove('hidden')}

loadKanban();
</script>
</body>
</html>
