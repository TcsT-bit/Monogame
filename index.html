<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM Tracker</title>
<style>
:root{--bg:#0A0A0F; --card:#111827; --accent:#00D26A; --text:#fff; --muted:#888}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);padding:20px;max-width:600px;margin:auto}
h1{text-align:center;color:var(--accent);margin-bottom:20px}
.card{background:var(--card);padding:20px;border-radius:16px;margin-bottom:15px}
input,button,select{width:100%;padding:14px;border-radius:10px;border:1px solid #333;background:#1a1f2e;color:#fff;font-size:16px;margin-top:8px}
button{background:var(--accent);color:#000;border:none;font-weight:700;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.02)}
.trip{display:flex;justify-content:space-between;padding:12px;background:#1a1f2e;border-radius:10px;margin-top:10px}
.total{font-size:28px;color:var(--accent);text-align:center;margin:15px 0}
.actions{display:flex;gap:10px}
.actions button{flex:1;background:#333;color:#fff}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
</style>
</head>
<body>

<h1>📍 KM TRACKER</h1>

<div class="card">
  <h3>New Trip</h3>
  <input type="text" id="tripName" placeholder="Trip Name - e.g. Site Visit, Delivery">
  <input type="number" id="startKM" placeholder="Starting KM" step="0.1">
  <input type="number" id="endKM" placeholder="Ending KM" step="0.1">
  <select id="purpose">
    <option value="Business">Business</option>
    <option value="Personal">Personal</option>
    <option value="Fuel Claim">Fuel Claim</option>
  </select>
  <button onclick="addTrip()">SAVE TRIP</button>
  <p class="note">Works 100% offline. Data saves on your phone.</p>
</div>

<div class="card">
  <h3>Total Distance</h3>
  <div class="total" id="totalKM">0.0 KM</div>
  <div class="actions">
    <button onclick="exportCSV()">EXPORT CSV</button>
    <button onclick="clearAll()">CLEAR ALL</button>
  </div>
</div>

<div class="card">
  <h3>Trip History</h3>
  <div id="tripList"></div>
</div>

<script>
let trips = JSON.parse(localStorage.getItem('trips')) || [];

function addTrip(){
  const name = document.getElementById('tripName').value;
  const start = parseFloat(document.getElementById('startKM').value);
  const end = parseFloat(document.getElementById('endKM').value);
  const purpose = document.getElementById('purpose').value;

  if(!name || isNaN(start) || isNaN(end)){
    alert('Please fill all fields'); return;
  }
  if(end < start){
    alert('End KM must be bigger than Start KM'); return;
  }

  const distance = (end - start).toFixed(1);
  const trip = {id:Date.now(), name, start, end, distance, purpose, date:new Date().toLocaleDateString()};
  trips.push(trip);
  localStorage.setItem('trips', JSON.stringify(trips));
  renderTrips();
  document.getElementById('tripName').value='';
  document.getElementById('startKM').value='';
  document.getElementById('endKM').value='';
}

function renderTrips(){
  const list = document.getElementById('tripList');
  list.innerHTML = '';
  let total = 0;
  trips.forEach(t=>{
    total += parseFloat(t.distance);
    list.innerHTML += `
      <div class="trip">
        <div>
          <b>${t.name}</b><br>
          <small>${t.date} | ${t.purpose}</small><br>
          <small>${t.start}KM → ${t.end}KM</small>
        </div>
        <div><b>${t.distance} KM</b></div>
      </div>
    `;
  });
  document.getElementById('totalKM').innerText = total.toFixed(1) + ' KM';
}

function clearAll(){
  if(confirm('Delete all trips?')){
    trips = [];
    localStorage.setItem('trips', JSON.stringify(trips));
    renderTrips();
  }
}

function exportCSV(){
  let csv = 'Date,Trip,Start KM,End KM,Distance, Purpose\n';
  trips.forEach(t=>{csv += `${t.date},${t.name},${t.start},${t.end},${t.distance},${t.purpose}\n`});
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'KM_Trips.csv'; a.click();
}

renderTrips();
</script>
</body>
</html>
