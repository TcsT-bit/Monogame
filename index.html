<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD MODE MONOPOLY 2026</title>
<style>
  :root{
    --bg1:#0f2027;--bg2:#203a43;--bg3:#2c5364;
    --glass:rgba(255,255,255,0.08);--blur:20px;
    --gold:#ffd700;--green:#00ff88;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
  body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px;
    backdrop-filter:blur(2px);
  }
  h1{
    margin:10px 0;font-size:clamp(20px,4vw,36px);
    background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(255,215,0,.4);animation:glow 2s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

  #lobby{
    background:var(--glass);backdrop-filter:blur(var(--blur));
    border:1px solid rgba(255,255,255,.2);padding:20px;border-radius:20px;
    text-align:center;margin-bottom:15px;box-shadow:0 8px 32px rgba(0,0,0,.4)
  }
  #lobby input{padding:10px;border-radius:10px;border:none;width:200px;margin:5px}

  #game{display:none;gap:15px;flex-wrap:wrap;justify-content:center}
  #board{
    display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);
    width:90vmin;height:90vmin;max-width:650px;max-height:650px;
    background:var(--glass);backdrop-filter:blur(var(--blur));
    border:2px solid rgba(255,255,255,.3);border-radius:15px;gap:2px;padding:5px;
    box-shadow:0 0 40px rgba(0,255,136,.2)
  }
 .tile{
    background:rgba(240,217,181,.9);color:#000;font-size:8px;text-align:center;
    padding:2px;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;border-radius:4px;border:1px solid rgba(0,0,0,.3);
    transition:transform.2s;cursor:pointer
  }
 .tile:hover{transform:scale(1.05);z-index:10}
 .tile.corner{font-size:10px;font-weight:bold;background:linear-gradient(135deg,#8b4513,#a0522d);color:#fff}
 .tile.property{background:rgba(232,228,211,.95)}
 .tile.colorbar{height:6px;width:100%;position:absolute;top:0;left:0;border-radius:4px 4px 0 0}
 .players{position:absolute;bottom:2px;left:2px;display:flex;gap:2px;flex-wrap:wrap}
 .p{width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 5px #000}
 .p1{background:#ff3366}.p2{background:#3399ff}.p3{background:#33ff66}.p4{background:#ffdd33}

  #panel{
    background:var(--glass);backdrop-filter:blur(var(--blur));
    border:1px solid rgba(255,255,255,.2);padding:15px;border-radius:20px;width:320px;
    display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.4)
  }
  #info{background:rgba(0,0,0,.5);padding:10px;border-radius:10px;min-height:120px;max-height:200px;overflow-y:auto;font-size:12px}
  button{
    background:linear-gradient(90deg,var(--gold),#ff8c00);color:#000;border:none;
    padding:12px;border-radius:12px;font-weight:bold;cursor:pointer;transition:.2s;
    box-shadow:0 4px 15px rgba(255,215,0,.3)
  }
  button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,.5)}
  button:disabled{background:#555;color:#999;transform:none}
  #dice{font-size:50px;text-align:center;animation:roll.5s}
  @keyframes roll{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
 .prop-list{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto}
 .prop-item{background:rgba(42,77,58,.8);padding:6px;border-radius:6px;font-size:11px;border-left:3px solid var(--green)}
 .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:100}
 .modal-content{background:var(--glass);backdrop-filter:blur(var(--blur));color:#fff;padding:20px;border-radius:20px;width:90%;max-width:400px;border:1px solid rgba(255,255,255,.3)}
  #roomLink{background:rgba(0,0,0,.5);padding:8px;border-radius:8px;word-break:break-all;font-size:12px}
</style>
</head>
<body>

<div id="lobby">

  <button onclick="createRoom()">CREATE ROOM</button><br>

  <div id="roomLink"></div>

<div id="game">
  <div id="board"></div>
  <div id="panel">
    <div><b>Room:</b> <span id="currentRoom"></span></div>
    <div id="dice">🎲</div>
    <button id="rollBtn" onclick="rollDice()">ROLL DICE</button>
    <button onclick="endTurn()">END TURN</button>
    <button onclick="buyHouse()">BUY HOUSE/HOTEL</button>
    <button onclick="trade()">TRADE</button>
    <button onclick="godMode()">GOD MODE +$1000</button>
    <div id="info"><b>Game Log:</b><br>Welcome to 2026</div>
    <div id="playerInfo"></div>
    <div class="prop-list" id="propList"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

      startGame();
    }
  });
}
