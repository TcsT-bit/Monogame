<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN - God Tier Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{display:flex;height:100vh;background:#0A0A0F;color:#fff}
.toolbar{width:80px;background:#111827;padding:10px;display:flex;flex-direction:column;gap:10px}
.toolbar button{background:#1F2937;border:none;color:#00D26A;padding:12px;border-radius:8px;cursor:pointer;font-size:20px}
.toolbar button:hover{background:#00D26A;color:#000}
.layers{width:250px;background:#111827;padding:15px}
#canvas{flex:1;background:#222;cursor:crosshair}
.header{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.header button{padding:10px 20px;background:#00D26A;border:none;border-radius:8px;color:#000;font-weight:900;cursor:pointer}
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="addText()">T</button>
  <button onclick="addRect()">▭</button>
  <button onclick="addCircle()">○</button>
  <button onclick="document.getElementById('imgInput').click()">🖼️</button>
  <input type="file" id="imgInput" style="display:none" onchange="addImage(event)">
</div>

<canvas id="canvas"></canvas>

<div class="layers">
  <h3>LAYERS</h3>
  <div id="layerList"></div>
  <button onclick="exportPNG()" style="width:100%;margin-top:20px;padding:12px;background:#FF5A00;border:none;border-radius:8px;color:#000;font-weight:900">EXPORT PNG</button>
</div>

<div class="header">
  <button onclick="addTemplate()">LOAD TEMPLATE</button>
  <button onclick="undo()">UNDO</button>
</div>

<script>
const canvas = new fabric.Canvas('canvas', {
  width: window.innerWidth - 330,
  height: window.innerHeight,
  backgroundColor: '#ffffff',
  preserveObjectStacking: true
});

// GOD TIER SETTINGS
fabric.Object.prototype.transparentCorners = false;
fabric.Object.prototype.cornerColor = '#00D26A';
fabric.Object.prototype.cornerStyle = 'circle';

function addText(){
  const text = new fabric.Textbox('Edit Me', {
    left: 100, top: 100, fontSize: 40, fill: '#000',
    fontFamily: 'Arial', width: 300
  });
  canvas.add(text).setActiveObject(text);
  updateLayers();
}

function addRect(){
  const rect = new fabric.Rect({
    left: 150, top: 150, width: 200, height: 100,
    fill: '#00D26A', stroke: '#000', strokeWidth: 2
  });
  canvas.add(rect);
  updateLayers();
}

function addCircle(){
  const circle = new fabric.Circle({
    left: 200, top: 200, radius: 50, fill: '#FF5A00'
  });
  canvas.add(circle);
  updateLayers();
}

function addImage(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(f){
    fabric.Image.fromURL(f.target.result, function(img){
      img.scaleToWidth(300);
      canvas.add(img);
      updateLayers();
    });
  }
  reader.readAsDataURL(file);
}

function updateLayers(){
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  canvas.getObjects().reverse().forEach((obj,i)=>{
    list.innerHTML += `<div style="padding:8px;background:#1F2937;margin:5px 0;border-radius:6px">${obj.type} ${i+1}</div>`;
  });
}

function exportPNG(){
  const dataURL = canvas.toDataURL({format: 'png', multiplier: 3}); // 3x for 300DPI
  const a = document.createElement('a');
  a.href = dataURL; a.download = 'Titan_Export.png'; a.click();
}

function addTemplate(){
  // Pro template system
  canvas.clear();
  canvas.backgroundColor = '#0A0A0F';
  addText();
  addRect();
}

canvas.on('object:added', updateLayers);
canvas.on('object:removed', updateLayers);
</script>
</body>
</html>
