<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM EVOLVE OS v3.9.2</title>
<meta name="theme-color" content="#FF5A00">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{ --orange:#FF5A00; --green:#00D26A; --cyan:#00D4FF; --red:#FF0040; }
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow-x:hidden}
#bg3d{position:fixed;inset:0;z-index:-1}
.quantum-text{font-family:'Orbitron',sans-serif;font-weight:900;text-shadow:0 0 15px var(--cyan)}
.glass{background:rgba(10,20,40,0.4);backdrop-filter:blur(25px);border:1px solid rgba(0,212,255,0.3);border-radius:24px}
.neon-border{box-shadow:0 0 20px rgba(0,212,255,0.4)}
.btn{background:linear-gradient(90deg,var(--orange),var(--green));color:#000;padding:14px 24px;border-radius:14px;font-weight:900;border:none;cursor:pointer;transition:0.3s}
.btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 0 30px var(--green)}
.btn-sec{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);padding:10px 18px;border-radius:12px;cursor:pointer}
.btn-danger{background:rgba(255,0,64,0.2);border:1px solid var(--red);color:var(--red)}
input,select,textarea{background:#0A0F1F;border:1px solid rgba(0,212,255,0.4);color:#fff;padding:14px;border-radius:12px;width:100%}
.hidden{display:none}.tab-btn{padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:var(--cyan);color:#000;box-shadow:0 0 20px var(--cyan)}
.link-box{background:#000;border:3px solid var(--cyan);padding:14px;border-radius:12px;font-family:monospace;font-size:14px;user-select:all;color:var(--cyan);width:100%}
.admin-bar{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid var(--cyan);padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.share-link{background:rgba(31,41,55,0.6);padding:12px;border-radius:10px;word-break:break-all;font-size:0.9rem;border:1px solid var(--cyan);color:var(--cyan);}
</style>
</head>
<body>
<canvas id="bg3d"></canvas>

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="glass p-10 max-w-2xl w-full neon-border">
    <h1 class="text-6xl text-center quantum-text mb-2">PSM EVOLVE OS</h1>
    <p class="text-center text-cyan-400 mb-8">v3.9.2 GOD TIER</p>
    <div class="grid grid-cols-3 gap-4">
      <div onclick="selectRole('CEO')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">👑</div><b class="text-orange-500">CEO</b></div>
      <div onclick="selectRole('Manager')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">📊</div><b class="text-green-500">MANAGER</b></div>
      <div onclick="selectRole('Reception')" class="glass p-6 text-center cursor-pointer"><div class="text-5xl">📞</div><b class="text-cyan-500">RECEPTION</b></div>
    </div>
    <div id="passBox" class="hidden mt-6"><input id="password" type="password" placeholder="Password"><button onclick="login()" class="btn w-full mt-3">ENTER SYSTEM</button></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="admin-bar">
    <span class="quantum-text text-orange-500" id="roleBadge">CEO</span>
    <button class="btn" style="width:auto" onclick="logout()">Logout</button>
    <button class="btn-sec" style="width:auto" onclick="generateClientLink()">GENERATE CLIENT LINK</button>
  </div>
  <div class="p-4 md:p-8">
    <div id="shareLinkBox" style="display:none;margin-bottom:15px" class="glass p-4">
      <h4 class="text-cyan-400 font-bold">Client Link Ready</h4>
      <div class="share-link mt-2" id="shareLink"></div>
      <button class="btn w-full mt-2" onclick="copyLink()">📋 COPY LINK</button>
    </div>

    <header class="glass p-5 flex justify-between items-center mb-6 neon-border">
      <h2 class="text-3xl quantum-text">PSM EVOLVE</h2>
    </header>

    <div class="flex gap-3 mb-6 overflow-x-auto">
      <button onclick="showTab('dashboard')" class="tab-btn active">Dashboard</button>
      <button onclick="showTab('jobs')" class="tab-btn">Jobs</button>
      <button onclick="showTab('quotes')" class="tab-btn" id="quoteTab">Quotes</button>
      <button onclick="showTab('stock')" class="tab-btn" id="stockTab">Stock</button>
      <button onclick="showTab('products')" class="tab-btn" id="prodTab">Products</button>
      <button onclick="showTab('clients')" class="tab-btn">Client Portal</button>
      <button onclick="showTab('payroll')" class="tab-btn" id="payTab">Payroll</button>
      <button onclick="showTab('reports')" class="tab-btn" id="repTab">Reports</button>
    </div>

    <div id="dashboard" class="tab">
      <div class="grid grid-cols-4 gap-4">
        <div class="glass p-5"><p class="text-5xl" id="statJobs">0</p><p>Active Jobs</p></div>
        <div class="glass p-5" id="statRevBox"><p class="text-5xl text-green-400" id="statRev">R0</p><p>Revenue</p></div>
        <div class="glass p-5" id="statStockBox"><p class="text-5xl text-red-400" id="statStock">0</p><p>Low Stock</p></div>
        <div class="glass p-5" id="statQuoteBox"><p class="text-5xl" id="statQuotes">0</p><p>Open Quotes</p></div>
      </div>
      <div class="glass p-5 mt-4"><h3 class="font-bold text-xl mb-2">AUDIT LOG</h3><div id="auditLog"></div></div>
    </div>

    <div id="jobs" class="tab hidden">
      <button onclick="startScanner()" class="btn mb-3" id="scanBtn">📷 SCAN BARCODE</button>
      <div id="reader" class="hidden w-full max-w-sm mb-3"></div>
      <div class="glass p-5 mb-4" id="jobForm">
        <div class="grid grid-cols-2 gap-3">
          <input id="jClient" placeholder="Client Name"><input id="jPhone" placeholder="27...">
          <input id="jReg" placeholder="Reg / Machine"><input id="jBarcode" placeholder="Scan Part #">
          <select id="jStatus"><option>QUOTED</option><option>IN PROGRESS</option><option>QC</option><option>READY</option><option>INVOICED</option></select>
          <input id="jAmount" type="number" placeholder="Amount R">
        </div>
        <button onclick="saveJob()" class="btn w-full mt-3">SAVE JOB</button>
      </div>
      <div id="jobList"></div>
    </div>

    <div id="quotes" class="tab hidden"><div class="glass p-5 mb-4"><input id="qClient" placeholder="Client"><textarea id="qItems" placeholder="Item | Qty | Price"></textarea><button onclick="saveQuote()" class="btn w-full mt-2">GENERATE QUOTE PDF</button></div><div id="quoteList"></div></div>
    <div id="stock" class="tab hidden"><div class="glass p-5 mb-4"><input id="sName" placeholder="Part Name"><input id="sQty" type="number" placeholder="Qty"><input id="sMin" type="number" placeholder="Min Alert"><input id="sCost" type="number" placeholder="Cost"><button onclick="addStock()" class="btn w-full mt-2">ADD STOCK</button></div><div id="stockList"></div></div>
    <div id="products" class="tab hidden"><div class="glass p-5 mb-4" id="prodForm"><input id="pName" placeholder="Product Name"><input id="pCode" placeholder="Product Code"><textarea id="pDesc" placeholder="Description"></textarea><input id="pImg" placeholder="Image URL"><input id="pVideo" placeholder="Video URL"><input id="pPrice" type="number" placeholder="Price R"><button onclick="saveProduct()" class="btn w-full mt-2">UPLOAD PRODUCT</button></div><div id="productList" class="grid grid-cols-3 gap-4"></div></div>
    <div id="clients" class="tab hidden"><div id="clientLinks"></div></div>
    <div id="payroll" class="tab hidden"><div class="glass p-5"><input id="empName" placeholder="Employee Name"><input id="empSalary" type="number" placeholder="Salary R"><button onclick="addEmployee()" class="btn mt-2">ADD EMPLOYEE</button></div><div id="empList" class="mt-4"></div></div>
    <div id="reports" class="tab hidden"><button onclick="exportCSV()" class="btn">📊 EXPORT CSV</button><button onclick="exportPDF()" class="btn ml-2">📄 EXPORT PDF</button></div>
  </div>
</div>

<!-- CLIENT VIEW -->
<div id="clientView" class="hidden p-6"><div class="glass p-6 neon-border"><h2 class="text-4xl quantum-text mb-4">PSM CLIENT PORTAL</h2><div id="clientJobs"></div><h3 class="text-2xl mt-6 mb-2">PRODUCTS</h3><div id="clientProducts" class="grid grid-cols-3 gap-3"></div></div></div>

<script>
const { jsPDF } = window.jspdf;
let DB = JSON.parse(localStorage.getItem('psm_db_god')) || migrateData();
let currentRole=''; let html5QrCode; let currentShareLink = '';
const PSM_WHATSAPP = '27799097420'; // CHANGE THIS TO YOUR NUMBER

function migrateData(){
  const old = localStorage.getItem('psm_db') || localStorage.getItem('psm_db2') || localStorage.getItem('psm_db3') || localStorage.getItem('psm_db35') || localStorage.getItem('psm_db_final');
  return old? JSON.parse(old) : {jobs:[],products:[],clients:[],stock:[],quotes:[],employees:[],audit:[]};
}

function saveDB(){localStorage.setItem('psm_db_god',JSON.stringify(DB));}
function addAudit(action){DB.audit.unshift({time:new Date().toLocaleString(),user:currentRole,action});if(DB.audit.length>50)DB.audit.pop();saveDB()}

// 3D BG
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);const renderer=new THREE.WebGLRenderer({canvas:bg3d,alpha:true});renderer.setSize(innerWidth,innerHeight);
const torus=new THREE.Mesh(new THREE.TorusGeometry(10,3,16,100),new THREE.MeshBasicMaterial({color:0x00D4FF,wireframe:true}));scene.add(torus);camera.position.z=30;function animate(){requestAnimationFrame(animate);torus.rotation.x+=0.01;torus.rotation.y+=0.01;renderer.render(scene,camera)}animate();

// LOGIN
const passwords={CEO:"ceo2026",Manager:"mgr2026",Reception:"rec2026"};
function selectRole(r){currentRole=r;passBox.classList.remove('hidden')}
function login(){if(password.value===passwords[currentRole]){localStorage.setItem('psm_role_god',currentRole);initApp()}else alert("Access Denied")}
function logout(){localStorage.removeItem('psm_role_god');location.reload();document.getElementById('shareLinkBox').style.display='none';}

function initApp(){
  loginScreen.classList.add('hidden');app.classList.remove('hidden');roleBadge.innerText=currentRole;
  if(currentRole==="Reception"){
    repTab.classList.add('hidden');payTab.classList.add('hidden');stockTab.classList.add('hidden');
    prodTab.classList.add('hidden');quoteTab.classList.add('hidden');
    statRevBox.classList.add('hidden');statStockBox.classList.add('hidden');statQuoteBox.classList.add('hidden');
    prodForm.classList.add('hidden');scanBtn.classList.add('hidden');
  }
  if(currentRole==="Manager"){
    payTab.classList.add('hidden');repTab.classList.add('hidden');
  }
  renderAll();
}

function showTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}

// TWINZ STYLE CLIENT LINK GENERATOR
function generateClientLink(){
  const baseUrl = window.location.origin + window.location.pathname;
  currentShareLink = baseUrl + '#client';
  document.getElementById('shareLink').innerText = currentShareLink;
  document.getElementById('shareLinkBox').style.display = 'block';
  alert('Client Link Generated! Click COPY LINK to share.');
}
function copyLink(){navigator.clipboard.writeText(currentShareLink); alert('Link Copied!');}

// BARCODE
function startScanner(){reader.classList.remove('hidden');html5QrCode=new Html5Qrcode("reader");html5QrCode.start({facingMode:"environment"},{fps:10},(code)=>{jBarcode.value=code;html5QrCode.stop();reader.classList.add('hidden')})}

// JOBS
function saveJob(){const job={id:Date.now(),client:jClient.value,phone:jPhone.value,reg:jReg.value,barcode:jBarcode.value,status:jStatus.value,amount:+jAmount.value||0,code:Math.random().toString(36).substr(2,8).toUpperCase()};DB.jobs.push(job);if(!DB.clients.find(c=>c.phone===jPhone.value))DB.clients.push({id:jPhone.value,name:jClient.value,phone:jPhone.value});saveDB();renderJobs();addAudit(`Job Created: ${jReg.value}`);jClient.value='';jPhone.value='';jReg.value='';jAmount.value='';}
function renderJobs(){jobList.innerHTML='';DB.jobs.slice(-20).reverse().forEach(j=>{
  jobList.innerHTML+=`<div class="glass p-4 mb-3">
    <div class="flex justify-between"><b>${j.reg}</b> <span class="text-green-400">R${j.amount}</span></div>
    <p>${j.client} | Status: ${j.status} | Code: ${j.code}</p>
    <div class="flex gap-2 mt-2 flex-wrap">
      <button onclick="genPDF(${j.id})" class="btn-sec text-xs">PDF INVOICE</button>
      <button onclick="sendWA('${j.phone}','${j.reg}','${j.status}')" class="btn-sec text-xs">WHATSAPP</button>
      <button onclick="delJob(${j.id})" class="btn-sec btn-danger text-xs">DELETE</button>
    </div>
  </div>`;
});statJobs.innerText=DB.jobs.filter(j=>j.status!=='INVOICED').length;statRev.innerText='R'+DB.jobs.reduce((a,b)=>a+b.amount,0).toLocaleString()}

function genPDF(id){const j=DB.jobs.find(x=>x.id===id);const doc=new jsPDF();doc.text("PSM AUTO INVOICE",20,20);doc.text(`Client:${j.client}`,20,30);doc.text(`Machine:${j.reg}`,20,40);doc.text(`Product:${j.barcode}`,20,50);doc.text(`TOTAL:R${j.amount}`,20,70);doc.save(`INVOICE_${j.reg}.pdf`)}
function sendWA(phone,reg,status){window.open(`https://wa.me/${phone}?text=*PSM UPDATE*%0A${reg}: ${status}%0ATrack: ${window.location.origin + window.location.pathname}#client`,'_blank')}

// QUOTES
function saveQuote(){DB.quotes.push({id:Date.now(),client:qClient.value,items:qItems.value});const doc=new jsPDF();doc.text(`QUOTATION FOR: ${qClient.value}`,20,20);doc.text(qItems.value,20,30);doc.save(`QUOTE_${qClient.value}.pdf`);saveDB();renderQuotes();addAudit(`Quote for ${qClient.value}`);qClient.value='';qItems.value='';}
function renderQuotes(){quoteList.innerHTML='';DB.quotes.forEach(q=>quoteList.innerHTML+=`<div class="glass p-3 mb-2">${q.client}</div>`);statQuotes.innerText=DB.quotes.length}

// STOCK
function addStock(){DB.stock.push({id:Date.now(),name:sName.value,qty:+sQty.value,min:+sMin.value,cost:+sCost.value});saveDB();renderStock();addAudit(`Stock Added: ${sName.value}`);sName.value='';sQty.value='';}
function renderStock(){stockList.innerHTML='';let low=0;DB.stock.forEach(s=>{if(s.qty<s.min)low++;stockList.innerHTML+=`<div class="glass p-3 mb-2">${s.name} - Qty:${s.qty} Cost:R${s.cost} ${s.qty<s.min?'<span class="text-red-400">LOW STOCK</span>':''}</div>`});statStock.innerText=low}

// PRODUCTS
function saveProduct(){DB.products.push({id:Date.now(),name:pName.value,code:pCode.value,desc:pDesc.value,img:pImg.value,video:pVideo.value,price:+pPrice.value});saveDB();renderProducts();addAudit(`Product: ${pName.value}`);pName.value='';pCode.value='';}
function renderProducts(){productList.innerHTML='';DB.products.forEach(p=>{productList.innerHTML+=`<div class="glass p-3"><img src="${p.img}" class="w-full h-40 object-cover rounded mb-2"><b>${p.name}</b><br><span class="text-cyan-400">${p.code}</span><br>R${p.price}<button onclick="alert('Code request sent for ${p.code}')" class="btn-sec w-full mt-1">REQUEST CODE</button><button onclick="delProd(${p.id})" class="btn-sec btn-danger w-full mt-1">DELETE</button></div>`})}
function delProd(id){DB.products=DB.products.filter(p=>p.id!==id);saveDB();renderProducts()}

// CLIENTS
function renderClients(){clientLinks.innerHTML='';DB.clients.forEach(c=>{
  const link=`${window.location.origin + window.location.pathname}#client`;
  clientLinks.innerHTML+=`<div class="glass p-4 mb-3">
    <b>${c.name}</b> - ${c.phone}
    <input value="${link}" readonly onclick="this.select()" class="link-box mt-1">
    <button onclick="copyLink()" class="btn-sec mt-1">COPY LINK</button>
  </div>`
})}

// PAYROLL
function addEmployee(){DB.employees.push({id:Date.now(),name:empName.value,salary:+empSalary.value});saveDB();renderEmp();addAudit(`Employee Added: ${empName.value}`);empName.value='';empSalary.value='';}
function renderEmp(){empList.innerHTML='';DB.employees.forEach(e=>empList.innerHTML+=`<div class="glass p-3 mb-2">${e.name} - R${e.salary.toLocaleString()}</div>`)}

// REPORTS
function exportCSV(){let csv="Job,Client,Amount,Status\n";DB.jobs.forEach(j=>csv+=`${j.reg},${j.client},${j.amount},${j.status}\n`);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv]));a.download="PSM_Report.csv";a.click()}
function exportPDF(){const doc=new jsPDF();doc.text("PSM MONTHLY REPORT",20,20);doc.text(`Total Jobs:${DB.jobs.length}`,20,30);doc.text(`Revenue:R${DB.jobs.reduce((a,b)=>a+b.amount,0)}`,20,40);doc.save("PSM_REPORT.pdf")}

// AUDIT
function renderAudit(){auditLog.innerHTML=DB.audit.slice(0,10).map(a=>`<p class="text-xs">${a.time} - ${a.user}: ${a.action}</p>`).join('')}

// PROFESSIONAL CLIENT REQUEST - NEW FUNCTION
function requestProduct(code, name, price){
  const message = `*NEW PRODUCT REQUEST - PSM EVOLVE*%0A%0A*Product:* ${name}%0A*Code:* ${code}%0A*Price:* R${price}%0A%0A*Message:* Hello PSM Team, I would like to request a quote/code for the above product.%0A%0A*Client Details:*%0AName: _______________%0AContact: _______________%0A%0A*PSM EVOLVE OS*`;
  window.open(`https://wa.me/${PSM_WHATSAPP}?text=${message}`,'_blank');
  alert(`Request sent to PSM Admin. We will contact you shortly.`);
}

// CLIENT VIEW - SMART ROUTING - ENHANCED TO SHOW IMAGES + PROFESSIONAL REQUEST
function checkClientView(){
  const hash = window.location.hash;
  if(hash === '#client'){
    loginScreen.classList.add('hidden');
    app.classList.add('hidden');
    clientView.classList.remove('hidden');
    clientJobs.innerHTML=DB.jobs.map(j=>`<div class="glass p-3 mb-2">${j.reg} - ${j.status}</div>`).join('');
    // PROFESSIONAL BUTTON NOW
    clientProducts.innerHTML=DB.products.map(p=>`<div class="glass p-3"><img src="${p.img}" class="w-full h-40 object-cover rounded mb-2"><b>${p.name}</b><br><span class="text-cyan-400">${p.code}</span><br>R${p.price}<button onclick="requestProduct('${p.code}','${p.name}',${p.price})" class="btn-sec w-full mt-1">📩 REQUEST QUOTE</button></div>`).join('');
  }
}

// INIT
function renderAll(){renderJobs();renderProducts();renderStock();renderQuotes();renderClients();renderEmp();renderAudit()}
window.onload=()=>{const r=localStorage.getItem('psm_role_god');if(r){currentRole=r;initApp()}checkClientView()}
function delJob(id){DB.jobs=DB.jobs.filter(j=>j.id!==id);saveDB();renderJobs();addAudit(`Job Deleted: ${id}`)}
</script>
</body>
</html>
