<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed KM Tracker</title>
<style>
:root{--bg:#0A0A0F; --accent:#00D26A; --orange:#FF5A00; --card:#111827}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:var(--bg);color:#fff;text-align:center;padding:20px}
h1{color:var(--accent);margin-bottom:20px;font-size:24px}
.display{background:var(--card);padding:30px;border-radius:20px;margin-bottom:20px}
.big{font-size:60px;font-weight:900;color:var(--accent)}
.label{color:#888;font-size:14px;margin-top:5px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
.box{background:var(--card);padding:20px;border-radius:16px}
.box .big{font-size:36px}
button{width:100%;padding:18px;border:none;border-radius:14px;font-size:18px;font-weight:900;cursor:pointer;margin-top:10px}
.btn-start{background:var(--accent);color:#000}
.btn-stop{background:var(--orange);color:#000}
.btn-reset{background:#333;color:#fff}
.note{font-size:12px;color:#888;margin-top:15px}
</style>
</head>
<body>

<h1>⏱️ SPEED + KM TRACKER</h1>

<div class="display">
  <div class="big" id="timer">00:00:00</div>
  <div class="label">TIME</div>
</div>

<div class="grid">
  <div class="box">
    <div class="big" id="distance">0.00</div>
    <div class="label">KM</div>
  </div>
  <div class="box">
    <div class="big" id="speed">0</div>
    <div class="label">KM/H</div>
  </div>
</div>

<button class="btn-start" id="startBtn" onclick="start()">START</button>
<button class="btn-stop" id="stopBtn" onclick="stop()" style="display:none">STOP</button>
<button class="btn-reset" onclick="reset()">RESET</button>

<p class="note">Works offline. Uses GPS. Allow location access.</p>

<script>
let timerInterval;
let startTime = 0;
let elapsed = 0;
let running = false;
let watchId = null;
let lastPos = null;
let totalDistance = 0;
let currentSpeed = 0;

function formatTime(ms){
  let s = Math.floor(ms/1000);
  let h = String(Math.floor(s/3600)).padStart(2,'0');
  let m = String(Math.floor(s%3600/60)).padStart(2,'0');
  let sec = String(s%60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function updateTimer(){
  elapsed = Date.now() - startTime;
  document.getElementById('timer').innerText = formatTime(elapsed);
}

function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371; // KM
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) + 
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function start(){
  if(!navigator.geolocation){
    alert('GPS not supported'); return;
  }
  
  running = true;
  startTime = Date.now() - elapsed;
  timerInterval = setInterval(updateTimer, 1000);
  
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  
  watchId = navigator.geolocation.watchPosition(pos=>{
    if(lastPos){
      let d = getDistance(lastPos.lat, lastPos.lon, pos.coords.latitude, pos.coords.longitude);
      totalDistance += d;
      document.getElementById('distance').innerText = totalDistance.toFixed(2);
    }
    lastPos = {lat: pos.coords.latitude, lon: pos.coords.longitude};
    currentSpeed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0;
    document.getElementById('speed').innerText = currentSpeed;
  }, err=>alert('Allow location access'), {enableHighAccuracy:true});
}

function stop(){
  running = false;
  clearInterval(timerInterval);
  navigator.geolocation.clearWatch(watchId);
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
}

function reset(){
  stop();
  elapsed = 0;
  totalDistance = 0;
  currentSpeed = 0;
  lastPos = null;
  document.getElementById('timer').innerText = '00:00:00';
  document.getElementById('distance').innerText = '0.00';
  document.getElementById('speed').innerText = '0';
}
</script>
</body>
</html>
