<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITAN PRO - God Tier Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<style>
:root{--bg:#050508; --panel:#0F1117; --accent:#00D26A; --border:#1F2937}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', system-ui}
body{display:flex;height:100vh;background:var(--bg);color:#E5E7EB;overflow:hidden}
.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
.toolbar{width:64px;background:var(--panel);border-right:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:8px;align-items:center}
.tool-btn{width:48px;height:48px;background:#1F2937;border:none;border-radius:10px;color:var(--accent);font-size:18px;cursor:pointer}
.tool-btn:hover{background:var(--accent);color:#000}
.tool-btn.active{background:var(--accent);color:#000}
#canvas-wrap{flex:1;position:relative;background:#1a1a1a}
#canvas{background:#fff;box-shadow:0 0 40px rgba(0,0,0,.5)}
.topbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:var(--panel);padding:8px;border-radius:12px;border:1px solid var(--border)}
.topbar button{padding:8px 16px;background:#1F2937;border:1px solid var(--border);border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
.topbar button.primary{background:var(--accent);color:#000;border:none}
.panel{padding:16px;border-bottom:1px solid var(--border)}
.panel h3{font-size:12px;text-transform:uppercase;color:#9CA3AF;margin-bottom:12px;letter-spacing:1px}
.prop-row{display:flex;justify-content:space-between;margin:8px 0;font-size:14px}
.prop-row input[type="color"]{width:32px;height:24px;border:none;background:none;cursor:pointer}
.layers-list{flex:1;overflow-y:auto}
.layer-item{padding:10px;display:flex;justify-content:space-between;align-items:center;background:#1F2937;margin:4px 8px;border-radius:8px;cursor:pointer;font-size:13px}
.layer-item.active{border:1px solid var(--accent)}
</style>
</head>
<body>

<div class="toolbar">
  <button class="tool-btn active" onclick="setTool('select')" title="Select">↖</button>
  <button class="tool-btn" onclick="setTool('text')" title="Text">T</button>
  <button class="tool-btn" onclick="setTool('rect')" title="Rectangle">▭</button>
  <button class="tool-btn" onclick="setTool('circle')" title="Circle">○</button>
  <button class="tool-btn" onclick="setTool('pen')" title="Pen Tool">✒</button>
  <button class="tool-btn" onclick="document.getElementById('imgInput').click()" title="Image">🖼</button>
  <input type="file" id="imgInput" style="display:none" onchange="addImage(event)">
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="topbar">
    <button onclick="undo()">↶ Undo</button>
    <button onclick="redo()">↷ Redo</button>
    <button onclick="loadTemplate()">Templates</button>
    <button class="primary" onclick="exportPDF()">Export 300DPI</button>
  </div>
</div>

<div class="sidebar">
  <div class="panel">
    <h3>Properties</h3>
    <div id="props">
      <div class="prop-row"><span>Fill</span><input type="color" id="fillColor" onchange="updateProp('fill', this.value)"></div>
      <div class="prop-row"><span>Opacity</span><input type="range" min="0" max="1" step="0.1" onchange="updateProp('opacity', this.value)"></div>
      <div class="prop-row"><span>Blend</span>
        <select onchange="updateProp('globalCompositeOperation', this.value)">
          <option value="source-over">Normal</option>
          <option value="multiply">Multiply</option>
          <option value="screen">Screen</option>
          <option value="overlay">Overlay</option>
        </select>
      </div>
    </div>
  </div>
  <div class="panel"><h3>Layers</h3></div>
  <div class="layers-list" id="layerList"></div>
</div>

<script>
const canvas = new fabric.Canvas('canvas', {
  width: window.innerWidth - 344,
  height: window.innerHeight,
  backgroundColor: '#ffffff',
  preserveObjectStacking: true,
  renderOnAddRemove: false // Performance: batch render
});

let history = [], historyIndex = -1;
let currentTool = 'select';

// PRO SETTINGS
fabric.Object.prototype.set({
  transparentCorners: false,
  cornerColor: '#00D26A',
  cornerStyle: 'circle',
  borderColor: '#00D26A',
  borderScaleFactor: 2
});

// HISTORY SYSTEM
function saveState(){
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.stringify(canvas.toJSON(['globalCompositeOperation'])));
  historyIndex++;
}
function undo(){ if(historyIndex > 0){ historyIndex--; canvas.loadFromJSON(history[historyIndex], canvas.renderAll.bind(canvas)); updateLayers(); }}
function redo(){ if(historyIndex < history.length - 1){ historyIndex++; canvas.loadFromJSON(history[historyIndex], canvas.renderAll.bind(canvas)); updateLayers(); }}

canvas.on('object:modified', saveState);
canvas.on('object:added', ()=>{saveState(); updateLayers();});
canvas.on('object:removed', ()=>{saveState(); updateLayers();});

// TOOL SYSTEM
function setTool(tool){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  currentTool = tool;
  canvas.isDrawingMode = tool === 'pen';
}

function addText(){
  const text = new fabric.Textbox('Double click to edit', {
    left: 200, top: 200, fontSize: 48, fill: '#111', fontFamily: 'Inter', width: 400
  });
  canvas.add(text).setActiveObject(text);
}

function addRect(){
  canvas.add(new fabric.Rect({left:250,top:250,width:300,height:180,fill:'#00D26A',rx:12,ry:12}));
}

function addCircle(){
  canvas.add(new fabric.Circle({left:300,top:300,radius:80,fill:'#FF5A00'}));
}

function addImage(e){
  const file = e.target.files[0];
  fabric.Image.fromURL(URL.createObjectURL(file), img=>{
    img.scaleToWidth(400);
    canvas.add(img);
  });
}

// LAYERS PANEL
function updateLayers(){
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  canvas.getObjects().slice().reverse().forEach((obj,i)=>{
    const div = document.createElement('div');
    div.className = 'layer-item' + (obj === canvas.getActiveObject()? ' active' : '');
    div.innerHTML = `<span>${obj.type} ${canvas.getObjects().length - i}</span>`;
    div.onclick = ()=>canvas.setActiveObject(obj);
    list.appendChild(div);
  });
  canvas.renderAll();
}

// PROPERTIES PANEL
canvas.on('selection:created', updateProps);
canvas.on('selection:updated', updateProps);
function updateProps(){
  const obj = canvas.getActiveObject();
  if(!obj) return;
  document.getElementById('fillColor').value = obj.fill || '#000000';
}
function updateProp(key, val){
  const obj = canvas.getActiveObject();
  if(obj){ obj.set(key, val); canvas.requestRenderAll(); }
}

// TEMPLATES
function loadTemplate(){
  canvas.clear();
  canvas.backgroundColor = '#0A0A0F';
  const t = new fabric.Textbox('TITAN POSTER', {left:100,top:100,fontSize:72,fill:'#00D26A',fontWeight:900});
  const s = new fabric.Rect({left:80,top:200,width:600,height:400,fill:'transparent',stroke:'#00D26A',strokeWidth:4});
  canvas.add(t,s);
}

// PRO EXPORT
function exportPDF(){
  const dataURL = canvas.toDataURL({format:'png', multiplier:4, quality:1}); // 4x = ~300DPI for A4
  const a = document.createElement('a');
  a.href = dataURL; a.download = 'TITAN_4K.png'; a.click();
}

saveState(); // Initial state
window.addEventListener('resize', ()=>canvas.setDimensions({width:window.innerWidth-344,height:window.innerHeight}));
</script>
</body>
</html>
