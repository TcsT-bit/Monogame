<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORTRESS MONOPOLY SA - LINK MULTIPLAYER</title>
<style>
  /* ... KEEP ALL YOUR CSS FROM ABOVE ... */
  .code-box{background:#000;padding:10px;border-radius:8px;font-family:monospace;word-break:break-all;font-size:11px;max-height:100px;overflow-y:auto}
</style>
</head>
<body>
<h1>FORTRESS MONOPOLY SA 🇿🇦 - LINK MODE</h1>
<div id="rules">
<b>HOW TO PLAY:</b> Play turn → "Generate Code" → Send code to friend → They "Load Code" → Play → Send back
</div>

<div id="lobby">
  <h2>Start Game</h2>
  <input id="playerName" placeholder="Your Name">
  <button onclick="startOffline()">NEW GAME 2-4 PLAYERS</button>
</div>

<div id="game">
  <div id="board"></div>
  <div id="panel">
    <div><b>Turn:</b> <span id="currentPlayer"></span></div>
    <div id="diceWrap"><span class="die" id="d1">⚀</span><span class="die" id="d2">⚀</span></div>
    <button id="rollBtn" onclick="rollDice()">ROLL DICE</button>
    <button onclick="endTurn()">END TURN</button>
    <button onclick="buyHouse()">BUY HOUSE/HOTEL</button>
    <button onclick="mortgageMenu()">MORTGAGE</button>
    <button onclick="generateCode()">1. GENERATE TURN CODE</button>
    <button onclick="loadCodePrompt()">2. LOAD CODE FROM FRIEND</button>
    <button onclick="godMode()">FORTRESS MODE +R1000</button>
    <div id="info"><b>Game Log:</b></div>
    <div id="playerInfo"></div>
    <div class="prop-list" id="propList"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
// KEEP YOUR BOARD + COLORS FROM YOUR CODE ABOVE

let game, myPlayerId=0;

function initBoard(){ /* SAME AS YOURS */ }

// NEW: COMPRESS GAME TO CODE
window.generateCode = () => {
  const gameString = JSON.stringify(game);
  const compressed = btoa(encodeURIComponent(gameString)); // base64
  showModal(`Send this code to next player:<br><div class="code-box">${compressed}</div><button onclick="navigator.clipboard.writeText('${compressed}')">COPY CODE</button>`);
  log("Code generated. Send it to next player on WhatsApp");
}

// NEW: LOAD GAME FROM CODE
window.loadCodePrompt = () => {
  showModal(`Paste code from friend:<br><textarea id="codeInput" style="width:100%;height:100px"></textarea><br><button onclick="loadCode()">LOAD GAME</button>`);
}

window.loadCode = () => {
  const code = document.getElementById('codeInput').value;
  try{
    const decompressed = decodeURIComponent(atob(code));
    game = JSON.parse(decompressed);
    closeModal();
    startGame();
    log("Game loaded! It's now " + game.players[game.current].name + "'s turn");
  }catch(e){
    alert("Invalid code!");
  }
}

window.startOffline = () => {
  const name = document.getElementById('playerName').value || "Player1";
  const playerCount = parseInt(prompt("How many players? 2-4","2"));
  game = {players:[],current:0,houses:32,hotels:12,freeParkingPot:0};
  for(let i=0;i<playerCount;i++){
    game.players.push({name: i==0?name:`Player${i+1}`,money:1500,pos:0,props:[],inJail:0,doubles:0,color:playerColors[i]});
  }
  startGame();
}

function startGame(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  initBoard();
  updatePlayers();
  updatePlayerInfo();
}

function saveGame(){ localStorage.setItem('fortressSA',JSON.stringify(game)); }

// KEEP ALL YOUR OTHER FUNCTIONS: rollDice, movePlayer, landOn, buyProperty etc
// JUST CHANGE THEM TO CALL saveGame() AT THE END

window.rollDice = () => {
  if(myPlayerId!== game.current){ log("Not your turn"); return; }
  // ... SAME DICE CODE ...
  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;
  document.getElementById('d1').innerText=['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
  document.getElementById('d2').innerText=['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
  log(`${game.players[game.current].name} rolled ${d1}+${d2}`);
  movePlayer(d1+d2, d1==d2);
  document.getElementById('rollBtn').disabled=true;
  saveGame();
}

function movePlayer(steps, isDouble){ /* SAME AS YOURS */ }
function landOn(pos){ /* SAME AS YOURS */ }
function buyProperty(pos){ /* SAME AS YOURS */ }
function endTurn(){ 
  game.current=(game.current+1)%game.players.length;
  document.getElementById('rollBtn').disabled=false;
  updatePlayerInfo();
  saveGame();
  log(`Turn passed to ${game.players[game.current].name}. Generate code now!`);
}
window.godMode = () => { game.players[game.current].money+=1000; log("FORTRESS MODE: +R1000"); saveGame(); }

// KEEP updatePlayers, updatePlayerInfo, showModal, closeModal FROM YOUR CODE
function updatePlayers(){ /* SAME */ }
function updatePlayerInfo(){
  const p=game.players[game.current];
  document.getElementById('currentPlayer').innerText=p.name;
  let html=`<b>Turn: ${p.name}</b><br>Money: R${p.money}`;
  document.getElementById('playerInfo').innerHTML=html;
  // ... rest same
}
function showModal(c){ document.getElementById('modalContent').innerHTML=c; document.getElementById('modal').style.display='flex'; }
window.closeModal = () => { document.getElementById('modal').style.display='none'; }
</script>
</body>
</html>
