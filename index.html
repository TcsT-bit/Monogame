<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM EVOLVE ERP v6.0 - 10X EVOLVE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
body { background: #0a0f1e; }
.glass { backdrop-filter: blur(12px); background: rgba(255,255,255,0.05); }
.status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
.status-quote { background: #f59e0b; }
.status-approved { background: #10b981; }
.status-progress { background: #3b82f6; }
.status-done { background: #8b5cf6; }
</style>
</head>
<body class="text-white">

<header class="glass p-4 sticky top-0">
  <h1 class="text-2xl font-bold text-cyan-400">PSM EVOLVE ERP v6.0</h1>
  <p id="liveClock" class="text-xs"></p>
</header>

<nav class="p-4 flex gap-4 border-b border-gray-700">
  <button onclick="showTab('dashboard')" class="font-bold">Dashboard</button>
  <button onclick="showTab('jobs')">Live Job Board</button>
  <button onclick="showTab('newjob')">New Job Card</button>
</nav>

<!-- LIVE DASHBOARD -->
<div id="dashboardTab" class="p-6">
  <h2 class="text-xl font-bold mb-4">LIVE WORKSHOP OVERVIEW</h2>
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="glass p-4 rounded"><p class="text-sm">Revenue MTD</p><p id="revMTD" class="text-2xl font-bold">R0</p></div>
    <div class="glass p-4 rounded"><p class="text-sm">Open Jobs</p><p id="openJobs" class="text-2xl font-bold">0</p></div>
    <div class="glass p-4 rounded"><p class="text-sm">Techs Clocked In</p><p id="techsIn" class="text-2xl font-bold">0</p></div>
    <div class="glass p-4 rounded"><p class="text-sm">Avg Turnaround</p><p id="avgTime" class="text-2xl font-bold">0h</p></div>
  </div>
  <h3 class="font-bold mb-2">Live Activity Feed</h3>
  <div id="activityFeed" class="glass p-4 rounded h-64 overflow-y-auto"></div>
</div>

<!-- LIVE JOB BOARD - KANBAN LIKE EVOLVE -->
<div id="jobsTab" class="p-6 hidden">
  <div class="grid grid-cols-4 gap-4">
    <div><h3 class="font-bold">QUOTED</h3><div id="col-quote" class="min-h-96"></div></div>
    <div><h3 class="font-bold">APPROVED</h3><div id="col-approved" class="min-h-96"></div></div>
    <div><h3 class="font-bold">IN PROGRESS</h3><div id="col-progress" class="min-h-96"></div></div>
    <div><h3 class="font-bold">COMPLETED</h3><div id="col-done" class="min-h-96"></div></div>
  </div>
</div>

<!-- NEW JOB CARD WITH PHOTO UPLOAD -->
<div id="newjobTab" class="p-6 hidden">
  <div class="glass p-6 rounded max-w-4xl">
    <h2 class="text-xl font-bold">New Job Card</h2>
    <div class="grid grid-cols-3 gap-4 mt-4">
      <input id="regNo" placeholder="Reg / VIN" class="p-2 bg-gray-800 rounded">
      <input id="clientName" placeholder="Client" class="p-2 bg-gray-800 rounded">
      <input id="clientPhone" placeholder="27..." class="p-2 bg-gray-800 rounded">
    </div>
    <textarea id="concern" placeholder="Customer Concern" class="w-full p-2 bg-gray-800 rounded mt-4"></textarea>
    
    <h3 class="font-bold mt-4">Before Photos</h3>
    <input type="file" id="beforePhotos" multiple accept="image/*" class="mt-2">
    <div id="photoPreview" class="flex gap-2 mt-2"></div>

    <div id="partsList" class="mt-4"></div>
    <button onclick="addPart()" class="bg-cyan-600 px-4 py-2 rounded mt-2">+ Add Part/Labour</button>
    
    <button onclick="saveJobCard()" class="bg-green-600 px-6 py-3 rounded mt-4 w-full font-bold">CREATE JOB CARD + SEND QUOTE</button>
  </div>
</div>

<script>
const firebaseConfig = {apiKey:"YOUR_KEY",authDomain:"psm-auto.firebaseapp.com",projectId:"psm-auto",storageBucket:"psm-auto.appspot.com"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const storage = firebase.storage();

// LIVE CLOCK
setInterval(()=>liveClock.innerText = new Date().toLocaleString(),1000);

// REAL-TIME LISTENERS - THIS IS WHAT MAKES IT FEEL ALIVE
db.collection("jobcards").onSnapshot(snap=>{
  let rev=0, open=0;
  ['quote','approved','progress','done'].forEach(s=>document.getElementById('col-'+s).innerHTML='')
  snap.forEach(doc=>{
    const j = doc.data();
    rev += j.total || 0;
    if(j.status != 'done') open++;
    const card = `<div class="glass p-3 rounded mb-2">
      <p class="font-bold">${j.reg}</p><p class="text-sm">${j.client}</p>
      <p class="text-sm">R${j.total}</p>
      <button onclick="updateStatus('${doc.id}','progress')" class="text-xs bg-blue-600 px-2 py-1 rounded mt-1">Move</button>
    </div>`;
    document.getElementById('col-'+j.status).innerHTML += card;
  });
  revMTD.innerText = 'R'+rev; openJobs.innerText = open;
});

db.collection("clock").where("status","==","Active").onSnapshot(s=>techsIn.innerText = s.size);

// ACTIVITY FEED
db.collection("audit").orderBy("time","desc").limit(10).onSnapshot(s=>{
  activityFeed.innerHTML = s.docs.map(d=>`<p class="text-sm">${d.data().action} - ${new Date(d.data().time.seconds*1000).toLocaleTimeString()}</p>`).join('')
});

let parts = [{desc:"",qty:1,cost:0,price:0}];
function addPart(){parts.push({desc:"",qty:1,cost:0,price:0});renderParts();}
function renderParts(){
  partsList.innerHTML = parts.map((p,i)=>`<div class="flex gap-2 mb-2">
    <input placeholder="Part/Labour" onchange="parts[${i}].desc=this.value" class="flex-1 p-2 bg-gray-800 rounded">
    <input type="number" value="1" onchange="parts[${i}].qty=this.value" class="w-20 p-2 bg-gray-800 rounded">
    <input type="number" placeholder="Price" onchange="parts[${i}].price=this.value" class="w-32 p-2 bg-gray-800 rounded">
  </div>`).join('')
}

async function saveJobCard(){
  const total = parts.reduce((s,p)=>s+p.qty*p.price,0);
  const job = {
    reg: regNo.value, client: clientName.value, phone: clientPhone.value, 
    concern: concern.value, parts: parts, total: total, 
    status: 'quote', created: new Date()
  };
  const ref = await db.collection("jobcards").add(job);
  await db.collection("audit").add({action:`Job ${ref.id} Created`,time:new Date()});
  
  // AUTO WHATSAPP QUOTE
  const link = location.origin + '#job=' + ref.id;
  window.open(`https://wa.me/${job.phone}?text=PSM Quote for ${job.reg}: R${total}. Approve: ${link}`);
  alert('Job Created. Quote sent to client.');
}

function updateStatus(id,status){
  db.collection("jobcards").doc(id).update({status});
  db.collection("audit").add({action:`Job ${id} moved to ${status}`,time:new Date()});
}

function showTab(t){
  ['dashboard','jobs','newjob'].forEach(x=>document.getElementById(x+'Tab').classList.add('hidden'));
  document.getElementById(t+'Tab').classList.remove('hidden');
}

renderParts();
</script>
</body>
</html>
