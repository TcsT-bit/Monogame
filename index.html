<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>SHANA PRINCESS ECS</title>
<style>
:root{--bg1:#1a0033;--bg2:#4a0080;--bg3:#ff00ff;--gold:#ffd700;--pink:#ff69b4;--cyan:#00ffff;--glass:rgba(255,255,255,.12);--blur:30px}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));overflow:hidden;height:100vh}
#loading{position:fixed;inset:0;background:#000;display:grid;place-items:center;z-index:999}
.title{font-size:clamp(30px,8vw,80px);font-weight:900;background:linear-gradient(90deg,#ffd700,#ff69b4,#00ffff,#ffd700);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 2s infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 15px var(--pink))}50%{filter:drop-shadow(0 0 30px var(--cyan))}}
#menu{display:none;text-align:center;padding:20px}
.btn{background:linear-gradient(90deg,var(--gold),var(--pink));color:#000;border:0;padding:15px 30px;margin:10px;border-radius:20px;font-weight:900;font-size:16px;cursor:pointer}
#game{display:none;width:100%;height:100%}
#topbar{display:flex;justify-content:space-between;padding:10px;background:var(--glass);backdrop-filter:blur(var(--blur))}
.stat{background:var(--glass);padding:8px 15px;border-radius:15px;border:2px solid var(--gold)}
#gl{width:100%;height:calc(100% - 60px);display:block}
#ui{position:absolute;bottom:0;left:0;width:100%;display:flex;gap:10px;padding:10px;justify-content:center;flex-wrap:wrap}
.wardrobe{position:absolute;right:0;top:60px;width:320px;height:calc(100% - 120px);background:var(--glass);backdrop-filter:blur(var(--blur));overflow-y:auto;padding:10px;border-left:3px solid var(--pink)}
.item{width:90px;height:90px;background:rgba(255,255,255,.2);margin:5px;display:inline-grid;place-items:center;border-radius:10px;cursor:pointer;border:2px solid transparent;font-size:10px}
.item.active{border:3px solid var(--cyan)}
</style>
</head>
<body>
<div id="loading"><div class="title">SHANA PRINCESS</div></div>
<div id="menu">
<h1 class="title">SHANA PRINCESS</h1>
<button class="btn" onclick="Game.start('adventure')">ADVENTURE</button>
<button class="btn" onclick="Game.start('academy')">ACADEMY</button>
<button class="btn" onclick="Game.start('battle')">ARENA</button>
<button class="btn" onclick="Game.load()">LOAD</button>
</div>
<div id="game">
<div id="topbar">
<div class="stat">💎<span id="gems">1000</span></div>
<div class="stat">👑<span id="level">1</span></div>
<div class="stat">❤️<span id="energy">100</span></div>
<div class="stat">🐉<span id="dragonLevel">1</span></div>
</div>
<canvas id="gl"></canvas>
<div class="wardrobe" id="wardrobe"></div>
<div id="ui">
<button class="btn" onclick="Game.battle()">BATTLE</button>
<button class="btn" onclick="Game.rhythm()">RHYTHM</button>
<button class="btn" onclick="Game.school()">SCHOOL</button>
<button class="btn" onclick="Game.save()">SAVE</button>
</div>
</div>
<script type="module">
const ECS=(()=>{let id=0,entities=new Set(),comps=new Map();return{create:()=>{const e=id++;entities.add(e);return e},add:(e,c,d)=>{if(!comps.has(c))comps.set(c,new Map());comps.get(c).set(e,d)},get:(e,c)=>comps.get(c)?.get(e),query:(...cs)=>[...entities].filter(e=>cs.every(c=>comps.get(c)?.has(e))),remove:(e,c)=>comps.get(c)?.delete(e)}})();
const Pool=class{constructor(fn,n){this.fn=fn;this.pool=Array.from({length:n},fn)}acquire(){return this.pool.pop()||this.fn()}release(o){this.pool.push(o)}};
const Store={gems:1000,level:1,energy:100,dragonLevel:1,outfit:0,mode:'adventure'};
const OUTFITS=[{c1:"#ff3300",c2:"#ff9900",glow:"#ff6600"},{c1:"#00ccff",c2:"#0066ff",glow:"#00ffff"},{c1:"#ff66cc",c2:"#9900ff",glow:"#ff00ff"},{c1:"#33cc33",c2:"#99ff00",glow:"#00ff00"},{c1:"#ffd700",c2:"#007A4D",glow:"#ffd700"}];

const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl',{antialias:true,alpha:false});
if(!gl)throw new Error('WebGL not supported');

const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`,fs=`precision highp float;uniform vec3 c;void main(){gl_FragColor=vec4(c,1);}`;
const prog=gl.createProgram();
[vs,fs].forEach((s,i)=>{const sh=gl.createShader(i?gl.FRAGMENT_SHADER:gl.VERTEX_SHADER);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(sh);gl.attachShader(prog,sh)});
gl.linkProgram(prog);if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw gl.getProgramInfoLog(prog);

const buf=gl.createBuffer(),loc=gl.getAttribLocation(prog,'p'),uloc=gl.getUniformLocation(prog,'c');
const particlePool=new Pool(()=>({x:0,y:0,vx:0,vy:0,life:0}),500);
let particles=[],frame=0,raf=null,running=false;

const hex2rgb=h=>h.match(/\w\w/g).map(x=>parseInt(x,16)/255);

const Systems={
render:()=>{
gl.viewport(0,0,canvas.width,canvas.height);
gl.clearColor(.1,.05,.2,1);gl.clear(gl.COLOR_BUFFER_BIT);
gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
const o=OUTFITS[Store.outfit];gl.uniform3fv(uloc,hex2rgb(o.glow));
const verts=new Float32Array([-0.3,0.3,0.3,0.3,0,-0.2]);gl.bufferData(gl.ARRAY_BUFFER,verts,gl.DYNAMIC_DRAW);gl.drawArrays(gl.TRIANGLES,0,3);
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0});
},
state:()=>{document.getElementById('gems').textContent=Store.gems;document.getElementById('level').textContent=Store.level;document.getElementById('energy').textContent=Store.energy;document.getElementById('dragonLevel').textContent=Store.dragonLevel;}
};

const Game={
start:(mode)=>{Store.mode=mode;document.getElementById('loading').style.display='none';document.getElementById('menu').style.display='none';document.getElementById('game').style.display='block';running=true;Game.initUI();Game.loop()},
loop:()=>{if(!running)return;Systems.render();Systems.state();frame++;raf=requestAnimationFrame(Game.loop)},
initUI:()=>{const w=document.getElementById('wardrobe');w.innerHTML='';OUTFITS.forEach((o,i)=>{const d=document.createElement('div');d.className='item'+(i===Store.outfit?' active':'');d.style.background=`linear-gradient(${o.c1},${o.c2})`;d.onclick=()=>Game.equip(i);w.appendChild(d)})},
equip:(id)=>{Store.outfit=id;Store.energy=Math.max(0,Store.energy-5);Game.initUI();Game.spawn(canvas.width/2,canvas.height/2,20)},
battle:()=>{if(Store.energy<20)return;Store.energy-=20;if(Math.random()<0.3+Store.outfit*0.1){Store.gems+=100;Store.level++;Game.spawn(canvas.width/2,canvas.height/2,30)}},
rhythm:()=>{let s=0;for(let i=0;i<4;i++)if(Math.random()>.5)s+=25;Store.gems+=s},
school:()=>{Store.gems+=50;Store.energy=Math.max(0,Store.energy-10)},
save:()=>{try{localStorage.setItem('sp',JSON.stringify(Store))}catch(e){console.error(e)}},
load:()=>{try{const d=localStorage.getItem('sp');if(d)Object.assign(Store,JSON.parse(d));Game.start(Store.mode)}catch(e){console.error(e)}},
spawn:(x,y,n)=>{for(let i=0;i<n;i++){const p=particlePool.acquire();p.x=x;p.y=y;p.vx=(Math.random()-.5)*4;p.vy=(Math.random()-.5)*4;p.life=60;particles.push(p)}}
};

setTimeout(()=>{document.getElementById('loading').style.display='none';document.getElementById('menu').style.display='grid'},1500);
addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight-60});
canvas.width=innerWidth;canvas.height=innerHeight-60;
</script>
</body>
</html>
