<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM OS v500 - QUANTUM | 300/300 PILLARS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');
html, body { background: #000!important; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; }
.quantum-bg { background: radial-gradient(circle at 30% 20%, rgba(0,212,255,0.15) 0%, #000 70%)!important; }

/* FIX 1: REMOVED backdrop-filter. Use solid glass instead */
.q-card {
  background: rgba(10,20,40,0.7);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 24px;
  box-shadow: 0 0 30px rgba(0,212,255,0.15);
  transition: transform 0.2s;
}
.q-card:hover { transform: translateY(-4px); }

.quantum-text { text-shadow: 0 0 8px #00D4FF; font-family: 'Orbitron', sans-serif; font-weight: 900; }

/* FIX 2: 100 PILLARS ONLY + NO BOX-SHADOW ANIMATION */
.pillar-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; position: fixed; bottom: 20px; right: 20px; opacity: 0.6; }
.pillar-dot { width: 4px; height: 4px; background: #00FF88; border-radius: 1px; animation: quantum-pulse 5s infinite; }
@keyframes quantum-pulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.9; } /* REMOVED SCALE + SHADOW */
</style>
</head>
<body class="text-white quantum-bg">

<canvas id="bg3d" class="fixed inset-0 -z-10"></canvas>

<!-- 100 PILLARS VISUAL - WAS 300 -->
<div class="pillar-grid" id="pillarGrid"></div>
<div class="fixed bottom-6 right-6 text-xs z-20 q-card p-3">
  <p class="text-green-400 font-black quantum-text">100/300 PILLARS: ACTIVE</p>
  <p id="pillarStatus" class="text-cyan-400">Neural Net: Online</p>
</div>

<header class="absolute top-0 w-full p-6 flex justify-between z-20">
  <div>
    <h1 class="text-5xl font-black quantum-text">PSM OS // QUANTUM</h1>
    <p class="text-cyan-400">VALUATION: <span id="valuation">R84,000,000</span></p>
  </div>
  <button onclick="quantumMode()" class="q-card px-8 py-4 font-black text-xl quantum-text">Ω QUANTUM</button>
</header>

<div class="absolute inset-0 pt-32 p-8 grid-cols-3 gap-6">

  <div class="q-card p-6 col-span-2">
    <h3 class="text-xl font-black quantum-text">QUANTUM FINANCE</h3>
    <p class="text-5xl font-black quantum-text mt-3" id="revenue">R0</p>
    <p class="text-green-400 mt-2">↑ 42.7% MoM</p>
  </div>

  <div class="q-card p-6">
    <h3 class="text-xl font-black quantum-text">NEURAL AI</h3>
    <p id="aiPred" class="text-cyan-400 mt-4">Scanning...</p>
  </div>

  <div class="q-card p-6 col-span-3">
    <h3 class="text-xl font-black quantum-text">OPERATIONS</h3>
    <div class="grid grid-cols-3 gap-4 mt-3">
      <div><p class="text-gray-400">LIVE JOBS</p><div id="liveJobs" class="mt-2"></div></div>
      <div><p class="text-gray-400">INVENTORY</p><p id="inventory" class="text-xl font-black text-green-400">R2.3M</p></div>
      <div><p class="text-gray-400">VOICE</p><button onclick="startVoice()" class="w-full q-card py-3 mt-1">🎤 TALK</button></div>
    </div>
  </div>

</div>

<script>
// FIX 3: WRAP FIREBASE IN TRY/CATCH SO IT DOESN'T CRASH
try {
  const firebaseConfig = { apiKey: "YOUR_KEY", projectId: "psm-os" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.collection("jobs").limit(5).onSnapshot(snap=>{
    liveJobs.innerHTML = '';
    snap.forEach(doc=>{ let j = doc.data(); liveJobs.innerHTML += `<p class="text-sm">${j.reg}</p>`; });
  });
} catch(e){
  console.log("Firebase offline - Demo mode");
  liveJobs.innerHTML = '<p class="text-sm">CAT-773</p><p class="text-sm">ANG-001</p>';
}

// 100 PILLARS ONLY
let dots = '';
for(let i=0; i<100; i++){ dots += `<div class="pillar-dot" style="animation-delay:${i*0.01}s"></div>` }
pillarGrid.innerHTML = dots;

// FAST COUNTER
function quantumCount(id, end){
  let s=0; let step = end/20;
  let i=setInterval(()=>{s+=step; document.getElementById(id).innerText="R"+Math.floor(s).toLocaleString(); if(s>=end) clearInterval(i);},10);
}
quantumCount("revenue", 8400000);

// AI LOOP
let aiProgress = 0;
setInterval(()=>{
  const preds = ["CAT-773: Failure 142h", "Anglo: R1.2M Ready", "Inventory: Low Stock"];
  aiPred.innerText = "AI: " + preds[aiProgress++ % 3];
}, 2000);

// VOICE
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
function startVoice(){ recognition.start(); }
recognition.onresult = (e) => { pillarStatus.innerText = "Omega: " + e.results[0][0].transcript; }

function quantumMode(){ pillarStatus.innerText = "QUANTUM: Scan complete"; }

// LIGHT 3D - NO ROTATION ON MOBILE
let scene = new THREE.Scene(); scene.background = new THREE.Color(0x000);
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:bg3d, antialias:false}); // NO ANTIALIAS
renderer.setSize(window.innerWidth, window.innerHeight);
let particles = new THREE.BufferGeometry();
let positions = new Float32Array(100 * 3); // 100 particles only
for(let i=0; i<100*3; i++){ positions[i] = (Math.random()-0.5)*80; }
particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
let pSystem = new THREE.Points(particles, new THREE.PointsMaterial({color:0x00D4FF, size:0.15}));
scene.add(pSystem); camera.position.z = 50;
function animate(){ requestAnimationFrame(animate); pSystem.rotation.y += 0.0005; renderer.render(scene,camera); }
animate();
</script>
</body>
    </html>
