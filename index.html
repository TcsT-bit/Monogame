<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM OS v500 - LEVEL 10</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.7.2/dist/vanilla-tilt.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body { background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
.holo-bg { background: radial-gradient(circle at 50% 50%, rgba(0,212,255,0.1) 0%, #000 70%); }
.holo-card {
  background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(0,255,136,0.05));
  border: 1px solid rgba(0,212,255,0.3);
  backdrop-filter: blur(40px);
  transform-style: preserve-3d;
}
.neon-text { text-shadow: 0 0 10px #00D4FF, 0 0 20px #00D4FF, 0 0 40px #00D4FF; }
.scanline { background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); }
.hud-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, #00FF88, transparent); animation: scan 3s linear infinite; }
@keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.voice-active { box-shadow: 0 0 60px #00FF88; animation: voice-pulse 0.5s infinite; }
@keyframes voice-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>
<body class="text-white holo-bg scanline">

<!-- LEVEL 10: 3D BACKGROUND CANVAS -->
<canvas id="bg3d" class="fixed inset-0 -z-10"></canvas>

<!-- LEVEL 10: TOP HUD BAR -->
<header class="absolute top-0 w-full p-6 flex justify-between items-center z-20">
  <div>
    <h1 class="text-4xl font-black neon-text">PSM OS // LEVEL 10</h1>
    <p class="text-cyan-400">NEURAL NETWORK: 500/500 PILLARS ACTIVE</p>
  </div>
  <div class="flex gap-4">
    <button id="voiceBtn" onclick="startVoice()" class="border-2 border-green-400 px-6 py-3 rounded-full">🎤 VOICE</button>
    <div id="clock" class="text-2xl"></div>
  </div>
</header>

<!-- LEVEL 10: HOLOGRAPHIC KPI ORBIT -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px]">
  <div class="holo-card w-64 p-6 absolute" style="top:0; left:50%; transform:translateX(-50%)" data-tilt data-tilt-max="20">
    <p class="text-sm">REVENUE</p>
    <p id="kpiRev" class="text-4xl font-black neon-text">R0</p>
  </div>
  <div class="holo-card w-64 p-6 absolute" style="bottom:0; left:50%; transform:translateX(-50%)" data-tilt>
    <p class="text-sm">VALUATION</p>
    <p id="kpiVal" class="text-4xl font-black neon-text">R0</p>
  </div>
  <div class="holo-card w-64 p-6 absolute" style="left:0; top:50%; transform:translateY(-50%)" data-tilt>
    <p class="text-sm">DOWNTIME</p>
    <p id="kpiDown" class="text-4xl font-black text-red-400">R0/min</p>
    <div class="hud-line w-full top-0"></div>
  </div>
  <div class="holo-card w-64 p-6 absolute" style="right:0; top:50%; transform:translateY(-50%)" data-tilt>
    <p class="text-sm">AI ACCURACY</p>
    <p class="text-4xl font-black text-green-400">99.9%</p>
  </div>
</div>

<!-- LEVEL 10: AI NEURAL HUD CENTER -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
  <div class="w-96 h-96 border-2 border-cyan-400 rounded-full flex items-center justify-center">
    <div id="aiCore" class="w-32 h-32 bg-gradient-to-r from-cyan-400 to-green-400 rounded-full animate-pulse"></div>
  </div>
  <p id="aiText" class="text-center mt-4 text-cyan-400">AI: AWAITING COMMAND</p>
</div>

<!-- LEVEL 10: VOICE FEEDBACK -->
<div id="voiceLog" class="absolute bottom-20 left-1/2 -translate-x-1/2 bg-black/70 p-4 rounded-2xl w-[600px] text-center hidden">
  <p>Listening...</p>
</div>

<script>
let synth = window.speechSynthesis;
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

// LEVEL 10: 3D BACKGROUND
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas:bg3d, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
let geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
let material = new THREE.MeshBasicMaterial({color:0x00D4FF, wireframe:true});
let torus = new THREE.Mesh(geometry, material);
scene.add(torus); camera.position.z = 30;
function animate3D(){ requestAnimationFrame(animate3D); torus.rotation.x += 0.005; torus.rotation.y += 0.005; renderer.render(scene,camera); }
animate3D();

// LEVEL 10: VANILLA TILT FOR HOLOGRAMS
VanillaTilt.init(document.querySelectorAll(".holo-card"), {max: 25, speed: 400, glare: true, "max-glare": 0.5});

// LEVEL 10: ANIMATED COUNTERS
function count(id, end){ let s=0; let i=setInterval(()=>{s+=end/100; document.getElementById(id).innerText="R"+Math.floor(s).toLocaleString(); if(s>=end) clearInterval(i);},20); }
count("kpiRev", 8400000); count("kpiVal", 84000000); count("kpiDown", 12450);

// LEVEL 10: VOICE CONTROL
function startVoice(){
  voiceBtn.classList.add('voice-active');
  voiceLog.classList.remove('hidden');
  recognition.start();
  speak("PSM OS Online. State your command.");
}
recognition.onresult = (e) => {
  let cmd = e.results[0][0].transcript.toLowerCase();
  voiceLog.innerHTML = `<p>Command: ${cmd}</p>`;
  if(cmd.includes("new job")) { speak("Creating new job card"); aiText.innerText = "AI: Creating Job for CAT 773"; }
  if(cmd.includes("revenue")) { speak("Revenue this month is 8.4 million Rand"); }
  voiceBtn.classList.remove('voice-active');
}
function speak(text){
  let u = new SpeechSynthesisUtterance(text);
  u.voice = synth.getVoices().find(v => v.name.includes("Google"));
  synth.speak(u);
}

// CLOCK
setInterval(()=>clock.innerText = new Date().toLocaleTimeString(),1000);
</script>
</body>
</html>
