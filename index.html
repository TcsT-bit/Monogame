<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM TIER 5 ERP - ENTERPRISE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
<style>
body { background: #050a14; font-family: 'Inter', sans-serif; }
.glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.kanban-col { min-height: 70vh; }
.job-card { cursor: grab; transition: all 0.2s; }
.job-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.2); }
</style>
</head>
<body class="text-white">

<!-- P12 BRAND + P9 SECURITY: LOGIN -->
<div id="loginScreen" class="h-screen flex items-center justify-center">
  <div class="glass p-8 rounded-xl w-96">
    <h1 class="text-2xl font-bold text-center mb-4">PSM TIER 5 ERP</h1>
    <input id="email" type="email" placeholder="Email" class="w-full p-3 bg-gray-800 rounded mb-2">
    <input id="password" type="password" placeholder="Password" class="w-full p-3 bg-gray-800 rounded mb-4">
    <button onclick="login()" class="w-full bg-cyan-600 p-3 rounded font-bold">LOGIN P9</button>
  </div>
</div>

<div id="app" class="hidden">
<header class="glass p-4 sticky top-0 z-50 flex justify-between">
  <h1 class="text-xl font-bold">PSM ENTERPRISE <span class="text-xs text-cyan-400">TIER 5</span></h1>
  <div class="flex gap-4 items-center">
    <span id="notifBell" class="cursor-pointer">🔔</span>
    <span id="userInfo"></span>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded">Logout</button>
  </div>
</header>

<nav class="p-4 flex gap-6 border-b border-gray-800">
  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('kanban')">Live Job Board</button>
  <button onclick="showTab('crm')">CRM + Fleet</button>
  <button onclick="showTab('stock')">Stock + Parts</button>
  <button onclick="showTab('reports')">Reports P15</button>
  <button onclick="showTab('admin')">Admin P11</button>
</nav>

<!-- P15 ANALYTICS DASHBOARD -->
<div id="dashboardTab" class="p-6">
  <div class="grid grid-cols-5 gap-4 mb-6">
    <div class="glass p-4 rounded"><p>Revenue MTD</p><p id="kpiRev" class="text-3xl font-bold">R0</p></div>
    <div class="glass p-4 rounded"><p>Gross Profit</p><p id="kpiGP" class="text-3xl font-bold">0%</p></div>
    <div class="glass p-4 rounded"><p>Bay Utilization</p><p id="kpiBay" class="text-3xl font-bold">0%</p></div>
    <div class="glass p-4 rounded"><p>Open ROs</p><p id="kpiRO" class="text-3xl font-bold">0</p></div>
    <div class="glass p-4 rounded"><p>CSAT</p><p id="kpiCSAT" class="text-3xl font-bold">0</p></div>
  </div>
  <div id="activityFeed" class="glass p-4 rounded h-64 overflow-y-auto"></div>
</div>

<!-- P3 SYSTEM: DRAG DROP KANBAN WORKFLOW -->
<div id="kanbanTab" class="p-6 hidden">
  <button onclick="newJobModal()" class="bg-green-600 px-4 py-2 rounded mb-4">+ New Job Card</button>
  <div class="grid grid-cols-5 gap-4">
    <div><h3 class="font-bold">1. QUOTED</h3><div id="col-quote" class="kanban-col glass p-2 rounded"></div></div>
    <div><h3 class="font-bold">2. APPROVED</h3><div id="col-approved" class="kanban-col glass p-2 rounded"></div></div>
    <div><h3 class="font-bold">3. IN PROGRESS</h3><div id="col-progress" class="kanban-col glass p-2 rounded"></div></div>
    <div><h3 class="font-bold">4. QC</h3><div id="col-qc" class="kanban-col glass p-2 rounded"></div></div>
    <div><h3 class="font-bold">5. INVOICED</h3><div id="col-invoiced" class="kanban-col glass p-2 rounded"></div></div>
  </div>
</div>

<!-- P3 + P14 + P20: JOB CARD WITH AI -->
<div id="jobModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="glass p-6 rounded-xl w-4xl max-h-[90vh] overflow-y-auto">
    <h2 class="text-xl font-bold">New Job Card <span class="text-xs">P19 AI</span></h2>
    <div class="grid grid-cols-3 gap-4 mt-4">
      <input id="jcReg" placeholder="Reg/VIN" class="p-2 bg-gray-800 rounded">
      <input id="jcClient" placeholder="Client" class="p-2 bg-gray-800 rounded">
      <input id="jcPhone" placeholder="27..." class="p-2 bg-gray-800 rounded">
    </div>
    <textarea id="jcConcern" placeholder="Customer Concern - AI will suggest parts" class="w-full p-2 bg-gray-800 rounded mt-4" onkeyup="aiSuggest(this.value)"></textarea>
    <div id="aiSuggestions" class="text-sm text-cyan-400 mt-2"></div>

    <h3 class="font-bold mt-4">Photos P3</h3>
    <input type="file" id="jcPhotos" multiple accept="image/*">
    <div id="jcParts"></div>
    <button onclick="addJCPart()" class="bg-cyan-600 px-4 py-2 rounded mt-2">+ Part/Labour</button>

    <button onclick="saveJobCard()" class="bg-green-600 px-6 py-3 rounded mt-4 w-full">SAVE + AUTO SEND QUOTE P13</button>
    <button onclick="closeModal()" class="mt-2 w-full">Cancel</button>
  </div>
</div>

</div>

<script>
const firebaseConfig = {apiKey:"YOUR_KEY",authDomain:"psm-auto.firebaseapp.com",projectId:"psm-auto",storageBucket:"psm-auto.appspot.com"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(); const auth = firebase.auth(); const storage = firebase.storage(); const functions = firebase.functions();

let currentUser = null; let jcParts = [];

// P9 SECURITY: AUTH
auth.onAuthStateChanged(user=>{ if(user){currentUser=user;document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');initApp()} });

function login(){auth.signInWithEmailAndPassword(email.value,password.value)}
function logout(){auth.signOut()}

function initApp(){
  userInfo.innerText = currentUser.email;
  loadKanban(); loadKPIs(); loadActivity();
}

// P15 REAL-TIME KPIs
function loadKPIs(){
  db.collection("jobcards").onSnapshot(s=>{
    let rev=0,cost=0;
    s.forEach(d=>{rev+=d.data().total||0;cost+=d.data().cost||0});
    kpiRev.innerText='R'+rev.toLocaleString();
    kpiGP.innerText = rev>0? ((rev-cost)/rev*100).toFixed(1)+'%' : '0%';
    kpiRO.innerText = s.size;
  })
}

// P3 SYSTEM: DRAG DROP KANBAN - TIER 5
function loadKanban(){
  db.collection("jobcards").orderBy("created","desc").onSnapshot(s=>{
    ['quote','approved','progress','qc','invoiced'].forEach(col=>document.getElementById('col-'+col).innerHTML='')
    s.forEach(doc=>{
      const j=doc.data();
      const card = `<div class="job-card glass p-3 rounded mb-2" data-id="${doc.id}">
        <p class="font-bold">${j.reg}</p><p class="text-sm">${j.client}</p>
        <p class="text-sm">R${j.total}</p>
        <div class="flex gap-1 mt-2">
          <img src="${j.photos?.[0]||''}" class="w-12 h-12 object-cover rounded">
          <button onclick="openJob('${doc.id}')" class="text-xs bg-blue-600 px-2 rounded">Open</button>
        </div>
      </div>`;
      document.getElementById('col-'+j.status).innerHTML += card;
    });
    // MAKE COLUMNS DRAGGABLE
    ['quote','approved','progress','qc','invoiced'].forEach(status=>{
      new Sortable(document.getElementById('col-'+status), {
        group: 'jobs', animation: 150,
        onEnd: evt => { db.collection("jobcards").doc(evt.item.dataset.id).update({status: evt.to.id.replace('col-','')}) }
      });
    });
  })
}

// P19 AI: PREDICTIVE PARTS
function aiSuggest(text){
  if(text.length>5){
    const suggestions = text.toLowerCase().includes('brake')? "Suggested: Brake Pads, Brake Fluid, Disc Skim" : "Suggested: Oil, Filter, Gaskets";
    aiSuggestions.innerText = "AI: " + suggestions;
  }
}

let jcPartId=0;
function addJCPart(){jcParts.push({id:jcPartId++,desc:"",qty:1,cost:0,price:0});renderJCParts()}
function renderJCParts(){
  jcPartsDiv.innerHTML = jcParts.map(p=>`<div class="flex gap-2 mb-2">
    <input placeholder="Part #" onchange="jcParts[${p.id}].desc=this.value" class="flex-1 p-2 bg-gray-800 rounded">
    <input type=number value=1 onchange="jcParts[${p.id}].qty=this.value" class="w-20 p-2 bg-gray-800 rounded">
    <input type=number placeholder="Price" onchange="jcParts[${p.id}].price=this.value" class="w-32 p-2 bg-gray-800 rounded">
  </div>`).join('')
}

async function saveJobCard(){
  const total = jcParts.reduce((s,p)=>s+p.qty*p.price,0);
  const cost = jcParts.reduce((s,p)=>s+p.qty*p.cost,0);

  // P3: UPLOAD PHOTOS
  const files = jcPhotos.files;
  let photoURLs = [];
  for(let f of files){ const ref = storage.ref(`jobs/${Date.now()}_${f.name}`); await ref.put(f); photoURLs.push(await ref.getDownloadURL()) }

  const job = {reg:jcReg.value,client:jcClient.value,phone:jcPhone.value,concern:jcConcern.value,parts:jcParts,photos:photoURLs,total,cost,status:'quote',created:new Date(),tenant:'PSM'};
  const ref = await db.collection("jobcards").add(job);

  // P13 AUTOMATION + P14 INTEGRATION
  const link = location.origin + '#job=' + ref.id;
  window.open(`https://wa.me/${job.phone}?text=PSM Quote ${ref.id}: R${total}. Approve here: ${link}`);

  closeModal();
}

function showTab(t){['dashboard','kanban','crm','stock','reports','admin'].forEach(x=>document.getElementById(x+'Tab').classList.add('hidden'));document.getElementById(t+'Tab').classList.remove('hidden')}
function newJobModal(){document.getElementById('jobModal').classList.remove('hidden')}
function closeModal(){document.getElementById('jobModal').classList.add('hidden')}

</script>
</body>
</html>
